<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ 足球交易模拟器</title>
<style>
  :root{
    --pitch:#0c1f17; --pitch2:#102a1f; --card:#16352a; --card2:#1d4234;
    --line:#2a5a45; --accent:#39d98a; --accent2:#2ec27e; --gold:#ffd24a;
    --txt:#e8f5ee; --dim:#8fb5a4; --up:#3ddc84; --down:#ff6b6b; --warn:#ffb84d;
    --pot:#c98bff;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  body{
    font-family:"Segoe UI","Microsoft YaHei",sans-serif;
    background:linear-gradient(160deg,var(--pitch),var(--pitch2));
    color:var(--txt); min-height:100vh; padding:14px; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1100px; margin:0 auto}
  .topbar{
    display:flex; flex-wrap:wrap; gap:10px; align-items:center;
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:12px 16px; margin-bottom:12px; position:sticky; top:8px; z-index:20;
    box-shadow:0 6px 20px rgba(0,0,0,.3);
  }
  .topbar .club{font-size:18px; font-weight:700; display:flex; align-items:center; gap:8px}
  .stat{display:flex; flex-direction:column; line-height:1.15; padding:0 10px; border-left:1px solid var(--line)}
  .stat .lbl{font-size:11px; color:var(--dim)}
  .stat .val{font-size:16px; font-weight:700}
  .stat .val.gold{color:var(--gold)}
  .stat .val.neg{color:var(--down)}
  .spacer{flex:1}
  .tabs{display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap}
  .tab{
    background:var(--card); border:1px solid var(--line); color:var(--dim);
    padding:9px 16px; border-radius:10px; cursor:pointer; font-size:14px; font-weight:600; transition:.15s;
  }
  .tab:hover{color:var(--txt)}
  .tab.active{background:var(--accent); color:#06231a; border-color:var(--accent)}
  button{font-family:inherit}
  .btn{background:var(--accent); color:#06231a; border:none; border-radius:9px; padding:9px 18px; font-size:14px; font-weight:700; cursor:pointer; transition:.15s}
  .btn:hover{background:var(--accent2)}
  .btn:disabled{background:#2a4a3c; color:#5e8071; cursor:not-allowed}
  .btn.big{padding:13px 26px; font-size:15px}
  .btn.ghost{background:transparent; border:1px solid var(--line); color:var(--txt)}
  .btn.ghost:hover{border-color:var(--accent); color:var(--accent)}
  .btn.sell{background:var(--gold); color:#3a2c00}
  .btn.sell:hover{filter:brightness(1.08)}
  .btn.scout{background:var(--pot); color:#2a0a45}
  .btn.scout:hover{filter:brightness(1.08)}
  .btn.sm{padding:6px 10px; font-size:12px}
  .panel{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:12px}
  .panel h2{font-size:16px; margin-bottom:12px; display:flex; align-items:center; gap:8px}
  .grid{display:grid; gap:10px}
  .pcard{background:var(--card2); border:1px solid var(--line); border-radius:12px; padding:11px; display:flex; flex-direction:column; gap:7px; transition:.15s}
  .pcard:hover{border-color:var(--accent)}
  .pcard.starter{border-color:var(--accent); box-shadow:0 0 0 1px var(--accent) inset}
  .pcard.injured{opacity:.78}
  .pcard.wonder{border-color:var(--pot)}
  .prow{display:flex; align-items:center; gap:8px}
  .pos{font-size:11px; font-weight:800; width:34px; text-align:center; border-radius:6px; padding:3px 0; flex-shrink:0}
  .pos.GK{background:#5a4ad9}.pos.DF{background:#2e8ad9}.pos.MF{background:#27a567}.pos.FW{background:#d96b2e}
  .pname{font-weight:700; font-size:14px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .ovr{font-weight:800; font-size:16px; min-width:24px; text-align:right}
  .meta{font-size:12px; color:var(--dim); display:flex; gap:8px; flex-wrap:wrap; align-items:center}
  .val{font-weight:700; color:var(--txt)}
  .chg{font-size:12px; font-weight:700}
  .chg.up{color:var(--up)} .chg.down{color:var(--down)} .chg.flat{color:var(--dim)}
  .form-pill{font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px}
  .pot{font-weight:700; font-size:12px}
  .pot .stars{letter-spacing:-1px}
  .pot.known{color:var(--pot)} .pot.unknown{color:var(--dim)}
  .wonder-tag{background:var(--pot); color:#2a0a45; font-size:10px; font-weight:800; padding:1px 6px; border-radius:5px}
  .ctr-tag{font-size:10px; font-weight:700; padding:1px 6px; border-radius:5px; background:#3a2c00; color:var(--gold)}
  .ctr-tag.warn{background:#4a1f1f; color:var(--down)}
  .pcard .actions{display:flex; gap:6px; margin-top:1px}
  .pcard .actions button{flex:1}
  .squadsum{display:flex; gap:16px; flex-wrap:wrap; align-items:center; margin-bottom:12px}
  .ring{display:flex; flex-direction:column; align-items:center; gap:2px}
  .ring .num{font-size:23px; font-weight:800}
  .ring .num.warn{color:var(--warn)} .ring .num.neg{color:var(--down)}
  .ring .lbl{font-size:11px; color:var(--dim)}
  table{width:100%; border-collapse:collapse; font-size:14px}
  th,td{padding:9px 10px; text-align:left; border-bottom:1px solid var(--line)}
  th{color:var(--dim); font-size:12px; font-weight:600}
  tr.you{background:rgba(57,217,138,.12)}
  td.c,th.c{text-align:center}
  .pts{font-weight:800; color:var(--accent)}
  .real{color:var(--dim); font-size:12px}
  .news-item{border-left:3px solid var(--line); padding:8px 12px; margin-bottom:8px; background:var(--card2); border-radius:0 8px 8px 0; font-size:13px}
  .news-item.good{border-left-color:var(--up)}
  .news-item.bad{border-left-color:var(--down)}
  .news-item.match{border-left-color:var(--gold)}
  .news-item.scout{border-left-color:var(--pot)}
  .news-item .w{color:var(--dim); font-size:11px; margin-right:6px}
  .toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--card2); border:1px solid var(--accent); color:var(--txt); padding:12px 22px; border-radius:10px; font-size:14px; opacity:0; pointer-events:none; transition:.25s; z-index:80; box-shadow:0 8px 24px rgba(0,0,0,.4); max-width:90vw; text-align:center}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
  .overlay{position:fixed; inset:0; background:rgba(4,12,9,.72); display:none; align-items:center; justify-content:center; z-index:60; padding:16px}
  .overlay.show{display:flex}
  .modal{background:var(--card); border:1px solid var(--accent); border-radius:16px; padding:24px; max-width:480px; width:100%; max-height:90vh; overflow:auto}
  .modal.center{text-align:center}
  .modal h2{font-size:20px; margin-bottom:12px}
  .modal .score{font-size:40px; font-weight:800; margin:10px 0; letter-spacing:2px; text-align:center}
  .modal .res-W{color:var(--up)} .modal .res-L{color:var(--down)} .modal .res-D{color:var(--gold)}
  .modal p{color:var(--dim); margin-bottom:8px; font-size:14px}
  .celebrate{position:fixed; inset:0; z-index:95; display:flex; align-items:center; justify-content:center; padding:16px; overflow:hidden; background:radial-gradient(circle at 50% 28%, rgba(40,60,40,.55), rgba(2,8,6,.93))}
  .celebrate .cele-card{position:relative; z-index:2; text-align:center; background:linear-gradient(165deg,#173a24,#0a1f14); border:2px solid var(--gold); border-radius:22px; padding:34px 30px; max-width:440px; width:100%; box-shadow:0 0 70px rgba(212,175,55,.4); animation:celePop .55s cubic-bezier(.2,1.35,.5,1)}
  .celebrate .cele-trophy{font-size:80px; line-height:1; filter:drop-shadow(0 0 20px rgba(212,175,55,.75)); animation:celeFloat 2.2s ease-in-out infinite}
  .celebrate .cele-title{font-size:27px; font-weight:800; color:var(--gold); margin:10px 0 4px; letter-spacing:1px; text-shadow:0 0 18px rgba(212,175,55,.5)}
  .celebrate .cele-sub{color:var(--txt); font-size:16px; font-weight:600; margin-bottom:4px}
  .celebrate .cele-meta{color:var(--dim); font-size:13px; margin-bottom:18px}
  @keyframes celePop{from{transform:scale(.65);opacity:0} to{transform:scale(1);opacity:1}}
  @keyframes celeFloat{0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)}}
  .confetti{position:absolute; top:-16px; width:9px; height:15px; border-radius:1px; opacity:.92; animation:confFall linear forwards}
  @keyframes confFall{to{transform:translateY(110vh) rotate(620deg); opacity:.65}}
  .live{position:fixed; inset:0; z-index:92; display:flex; flex-direction:column; background:linear-gradient(160deg,#0a1f14,#05110b); padding:10px; gap:8px}
  .live .lv-top{display:flex; align-items:center; justify-content:center; gap:12px; padding:10px 8px; background:#0c2417; border:1px solid var(--line); border-radius:12px}
  .live .lv-team{font-weight:700; font-size:14px; max-width:34vw; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; text-align:center; flex:1}
  .live .lv-team.r{text-align:center}
  .live .lv-score{font-size:30px; font-weight:800; color:var(--gold); letter-spacing:2px; white-space:nowrap}
  .live .lv-min{font-size:12px; color:var(--dim); text-align:center; margin-top:2px}
  .live .lv-bar{height:7px; border-radius:4px; background:#13324a; overflow:hidden; display:flex}
  .live .lv-bar>i{display:block; height:100%}
  .live .lv-feed{flex:1; overflow:auto; display:flex; flex-direction:column; gap:5px; padding:2px}
  .live .lv-ev{font-size:13px; padding:6px 9px; border-radius:8px; background:#0c2417; border-left:3px solid var(--line); animation:evIn .22s}
  .live .lv-ev .m{color:var(--gold); font-weight:700; margin-right:6px}
  .live .lv-ev.goal{border-left-color:var(--up); background:#13301f; font-weight:600}
  .live .lv-ev.concede{border-left-color:var(--down); background:#301717}
  .live .lv-ev.card{border-left-color:#e3c34a}
  .live .lv-ev.big{border-left-color:var(--accent); background:#10283c}
  @keyframes evIn{from{opacity:0;transform:translateY(6px)} to{opacity:1}}
  .live .lv-ctrl{display:flex; flex-wrap:wrap; gap:6px; padding:8px; background:#0c2417; border:1px solid var(--line); border-radius:12px; align-items:center}
  .live .lv-note{width:100%; font-size:12px; color:var(--dim); text-align:center; margin-bottom:2px}
  .live .lv-pick{display:grid; grid-template-columns:1fr 1fr; gap:6px; width:100%; max-height:42vh; overflow:auto}
  .live .lv-pc{padding:7px 9px; border-radius:8px; background:#0e2a1b; border:1px solid var(--line); cursor:pointer; font-size:12px}
  .live .lv-pc.sel{border-color:var(--accent); background:#12324a}
  .live .lv-pc.hd{grid-column:1/-1; background:transparent; border:none; color:var(--dim); padding:2px 4px; cursor:default; font-size:12px}
  .live .stam{display:inline-block; height:5px; width:42px; border-radius:3px; background:#2a2a2a; overflow:hidden; vertical-align:middle; margin-left:4px}
  .live .stam>i{display:block; height:100%}
  .trait{display:inline-block; font-size:12px; line-height:1; padding:1px 2px; border-radius:5px; background:#1c2c3f; margin-right:1px; cursor:default}
  .trait.neg{background:#3a2030}
  .pname.clk{cursor:pointer} .pname.clk:hover{color:var(--accent); text-decoration:underline}
  .lnk{cursor:pointer; color:var(--accent); text-decoration:underline dotted}
  .field{margin:12px 0; text-align:left}
  .field label{display:block; font-size:13px; color:var(--dim); margin-bottom:5px}
  .field .row{display:flex; align-items:center; gap:10px}
  .field input[type=number], .field input[type=text]{background:var(--card2); border:1px solid var(--line); color:var(--txt); border-radius:8px; padding:9px 12px; font-size:15px; width:100%}
  .field input[type=range]{flex:1; accent-color:var(--accent)}
  .field .rngval{font-weight:700; min-width:60px; text-align:right}
  .negbox{background:var(--card2); border:1px solid var(--line); border-radius:10px; padding:12px; margin-bottom:6px; font-size:13px}
  .negbox .l{display:flex; justify-content:space-between; margin:3px 0}
  .negbox .l b{color:var(--txt)}
  .filterbar{display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap; align-items:center}
  .filterbar input{background:var(--card2); border:1px solid var(--line); color:var(--txt); border-radius:8px; padding:7px 12px; font-size:13px; flex:1; min-width:120px}
  .chip{background:var(--card2); border:1px solid var(--line); color:var(--dim); padding:6px 12px; border-radius:20px; font-size:12px; cursor:pointer; font-weight:600}
  .chip.active{background:var(--accent); color:#06231a; border-color:var(--accent)}
  .empty{color:var(--dim); text-align:center; padding:30px; font-size:14px}
  .hint{font-size:12px; color:var(--dim); margin-top:4px; line-height:1.5}
  .scoutslot{display:inline-flex; align-items:center; gap:6px; background:var(--card2); border:1px solid var(--line); border-radius:8px; padding:6px 12px; margin:0 6px 6px 0; font-size:13px}
  /* ===== 可视化球场 ===== */
  .pitch{position:relative; width:100%; max-width:470px; margin:6px auto 0; aspect-ratio:3/4;
    background:repeating-linear-gradient(#1c4a35 0 12.5%, #173b2c 12.5% 25%);
    border:2px solid #2f6b4f; border-radius:12px; overflow:hidden; touch-action:none}
  .pitch::before{content:""; position:absolute; left:6%; right:6%; top:50%; border-top:2px solid #ffffff2e}
  .pitch::after{content:""; position:absolute; left:50%; top:50%; width:84px; height:84px; transform:translate(-50%,-50%); border:2px solid #ffffff2e; border-radius:50%}
  .slot{position:absolute; transform:translate(-50%,-50%); text-align:center; width:64px; cursor:grab; user-select:none; z-index:2}
  .slot .disc{width:44px; height:44px; border-radius:50%; margin:0 auto; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:15px; color:#fff; border:2px solid #ffffff66; box-shadow:0 2px 6px rgba(0,0,0,.35)}
  .slot.empty .disc{border-style:dashed; background:#ffffff14; color:#cfe9dd; font-size:12px}
  .slot.empty.avail .disc{border-color:var(--accent); color:var(--accent)}
  .slot.oop .disc{box-shadow:0 0 0 2px var(--warn), 0 2px 6px rgba(0,0,0,.35)}
  .slot .disc.GK{background:#5a4ad9}.slot .disc.DF{background:#2e8ad9}.slot .disc.MF{background:#27a567}.slot .disc.FW{background:#d96b2e}
  .slot .nm{font-size:10px; margin-top:2px; color:#eaf6ef; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-shadow:0 1px 2px #000}
  .bench{display:flex; gap:6px; overflow-x:auto; padding:4px 2px 8px}
  .benchchip{flex:0 0 auto; background:var(--card2); border:1px solid var(--line); border-radius:8px; padding:6px 9px; cursor:grab; font-size:12px; white-space:nowrap; display:flex; align-items:center; gap:6px}
  .benchchip.sel{border-color:var(--accent); box-shadow:0 0 0 1px var(--accent) inset}
  .benchchip.injured{opacity:.5; cursor:not-allowed}
  @media(max-width:560px){ .stat{padding:0 6px} .stat .val{font-size:14px} .topbar .club{font-size:15px} }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="club">⚽ <span id="clubName">绿茵FC</span></div>
    <div class="stat"><span class="lbl">赛季 / 轮次</span><span class="val" id="weekVal">S1 · 第1轮</span></div>
    <div class="stat"><span class="lbl">联赛排名</span><span class="val" id="rankVal">—</span></div>
    <div class="stat"><span class="lbl">现金</span><span class="val gold" id="cashVal">€0</span></div>
    <div class="stat"><span class="lbl">净资产</span><span class="val" id="networthVal">€0</span></div>
    <div class="stat"><span class="lbl">周薪/轮</span><span class="val" id="wageVal">€0</span></div>
    <div class="spacer"></div>
    <button class="btn big" id="nextBtn">下一轮 ▶</button>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="squad">🧤 我的阵容</div>
    <div class="tab" data-tab="market">💱 转会市场</div>
    <div class="tab" data-tab="rivals">🆚 对手</div>
    <div class="tab" data-tab="scout">🔭 球探</div>
    <div class="tab" data-tab="train">🎓 训练</div>
    <div class="tab" data-tab="academy">🌱 青训</div>
    <div class="tab" data-tab="biz">💼 经营</div>
    <div class="tab" data-tab="national">🌐 国家队</div>
    <div class="tab" data-tab="conti">🌍 洲际杯</div>
    <div class="tab" data-tab="cal">📅 日历</div>
    <div class="tab" data-tab="honors">🏅 荣誉</div>
    <div class="tab" data-tab="league">🏆 联赛积分</div>
    <div class="tab" data-tab="news">📰 新闻</div>
    <div class="spacer"></div>
    <div class="tab" data-tab="menu">⚙️</div>
  </div>

  <div id="view"></div>
</div>

<div class="toast" id="toast"></div>
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>

<script>
"use strict";
/* =========================================================================
   足球交易模拟器  v2 — 混合模式（经理 + 交易员）
   A 阶段：潜力&成长 / 球探系统 / 转会谈判（周薪·合同·佣金）
   单文件 / 零依赖 / localStorage 存档
   ========================================================================= */

// ---------- 工具 ----------
const $ = s => document.querySelector(s);
const rnd = (a,b) => a + Math.random()*(b-a);
const rint = (a,b) => Math.floor(rnd(a,b+1));
const pick = arr => arr[Math.floor(Math.random()*arr.length)];
const clamp = (x,a,b) => Math.max(a,Math.min(b,x));
const round1 = x => Math.round(x*10)/10;
const round2 = x => Math.round(x*100)/100;
function eur(m){
  if(m<0) return "-"+eur(-m);
  if(m>=1000) return "€"+(m/1000).toFixed(2)+"B";
  if(m>=10) return "€"+m.toFixed(1)+"M";
  if(m>=1) return "€"+m.toFixed(2)+"M";
  return "€"+Math.round(m*1000)+"K";
}
function samplePoisson(l){ let L=Math.exp(-l),k=0,p=1; do{k++;p*=Math.random();}while(p>L); return k-1; }
function weightedPick(pairs){ // [[item,w],...]
  let tot=pairs.reduce((a,p)=>a+p[1],0), r=Math.random()*tot;
  for(const [it,w] of pairs){ if((r-=w)<=0) return it; } return pairs[0][0];
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

// ---------- 静态数据 ----------
const POS = ["GK","DF","MF","FW"];                 // 大类（筛选/生成分组）
const LINE_CN = {GK:"门将",DF:"后卫",MF:"中场",FW:"前锋"};
const POS_LINE = {GK:"GK", CB:"DF",LB:"DF",RB:"DF", DM:"MF",CM:"MF",AM:"MF",LM:"MF",RM:"MF", ST:"FW",LW:"FW",RW:"FW"};
const POS_CN = {GK:"门将", CB:"中卫",LB:"左后卫",RB:"右后卫", DM:"后腰",CM:"中前卫",AM:"前腰",LM:"左前卫",RM:"右前卫", ST:"中锋",LW:"左边锋",RW:"右边锋"};
const LINE_POS = {GK:["GK"], DF:["CB","CB","LB","RB"], MF:["CM","CM","DM","AM","LM","RM"], FW:["ST","ST","LW","RW"]};
const POS_ALL = Object.keys(POS_CN);
const REL_POS = {CB:["LB","RB","DM"], LB:["RB","LM","CB"], RB:["LB","RM","CB"], DM:["CM","CB"], CM:["DM","AM","LM","RM"], AM:["CM","LM","RM","ST"], LM:["RM","LW","CM"], RM:["LM","RW","CM"], ST:["AM","LW","RW"], LW:["RW","ST","LM"], RW:["LW","ST","RM"], GK:[]};
function detailedPos(x){ return POS_LINE[x] ? x : pick(LINE_POS[x]||["CM"]); }   // 大类→具体位置
// 位置坐标：x=是否边路(0中路/1边路)，y=纵向高度(0门将→1中锋)。用于计算位置相似度（镜像位如LB/RB相同→易学满级；跨线如CB/ST很远→难学且上限低）
const POS_XY = { GK:[0,0], CB:[0,0.18], LB:[1,0.28], RB:[1,0.28], DM:[0,0.42], CM:[0,0.52], LM:[1,0.52], RM:[1,0.52], AM:[0,0.66], ST:[0,0.92], LW:[1,0.86], RW:[1,0.86] };
function pairAff(a,b){ if(a===b) return 1; if((a==="GK")!==(b==="GK")) return 0.08; const A=POS_XY[a],B=POS_XY[b]; if(!A||!B) return 0.3; return clamp(1 - (Math.abs(A[1]-B[1])*1.1 + Math.abs(A[0]-B[0])*0.45), 0.12, 1); }
function learnAff(p, target){ let m=pairAff(p.pos,target); if(p.prof) for(const k in p.prof){ if(k!==target) m=Math.max(m, pairAff(k,target)*0.95); } return m; } // 学习时：已掌握的相近位置也有迁移
function masteryCap(p, target){ return clamp(0.65 + learnAff(p,target)*0.35, 0.65, 1.0); }   // 可达熟练度上限：相似→1.0，跨线→~0.72
function structEff(p, sp){ return clamp(0.5 + pairAff(p.pos,sp)*0.34, 0.5, 0.84); }            // 未训练靠天赋客串（上限0.84）
function posEff(p, sp){ if(p.pos===sp) return 1; const tr=(p.prof&&p.prof[sp]!=null)?p.prof[sp]:0; return Math.max(structEff(p,sp), tr); } // 取「天赋客串」与「已训练熟练度」较高者

  const chance=(ovr>=83?0.6:ovr>=76?0.42:ovr>=69?0.26:0.12);
  if(pool.length && Math.random()<chance) out.push(pick(pool));
  if(pool.length>1 && Math.random()<chance*0.35){ const t=pick(pool); if(!out.includes(t)) out.push(t); }

  return out;
}

function applyPromotionRelegation(){
  const before=myDiv();
  for(let d=0; d<DIV_NAMES.length-1; d++){
    const lower=divClubs(d+1).sort(cmpTable), upper=divClubs(d).sort(cmpTable);
    lower.slice(0,PROMO).forEach(c=>c.div=d);
    upper.slice(upper.length-PROMO).forEach(c=>c.div=d+1);
  }
  const after=myDiv();
  if(after<before){ const m=`🎉 升级！你的球队升入 ${DIV_NAMES[after]}！`; pushNews(m,"good"); return m; }
  if(after>before){ const m=`⬇️ 降级：你的球队跌入 ${DIV_NAMES[after]}。`; pushNews(m,"bad"); return m; }

}

let _id=1;
function fairValue(ovr,age){
  const base = Math.pow(Math.max(ovr-45,4)/10, 3) * 1.6;
  let af;
  if(age<=20) af=1.34; else if(age<=23) af=1.24; else if(age<=27) af=1.12;
  else if(age<=30) af=0.92; else if(age<=33) af=0.64; else af=0.40;
  return Math.max(0.2, base*af);
}
function wageDemand(ovr){ return round2(Math.pow(Math.max(ovr-48,3),1.4)*0.0009); } // €M/轮
function nameFor(nat){ const d=NATIONS[nat]; const pool=(d&&d.f)?d:(NAME_POOLS[d&&d.pool]||NAME_POOLS.brazil); return pick(pool.f)+" "+pick(pool.l); }

function makePlayer(pos, opt){
  // opt 可为数字(tierBoost，市场用) 或 {ovr,age,potBoost}(开局阵容用)
  let tierBoost=0, ovrFix=null, ageFix=null, potBoost=0, natFix=null;
  if(typeof opt==="number") tierBoost=opt;
  else if(opt){ tierBoost=opt.tier||0; if(opt.ovr!=null) ovrFix=opt.ovr; if(opt.age!=null) ageFix=opt.age; potBoost=opt.potBoost||0; if(opt.nat) natFix=opt.nat; }
  const age = ageFix!=null ? ageFix : rint(17,35);
  let ovr = ovrFix!=null ? clamp(Math.round(ovrFix),42,93)
    : clamp(Math.round(rnd(57,79) + (Math.random()<0.18? rnd(4,13):0) + tierBoost), 48, 92);
  // 潜力：越年轻空间越大，偶有妖人
  let potExtra;
  if(age<=18) potExtra=rint(2,20); else if(age<=20) potExtra=rint(1,15);
  else if(age<=23) potExtra=rint(0,9); else if(age<=26) potExtra=rint(0,4); else potExtra=0;
  potExtra += potBoost;
  const potential = clamp(ovr+potExtra, ovr, 99);
  const formIdx = rint(0,4);
  const nat = (natFix&&NATIONS[natFix])?natFix:weightedPick(NAT_KEYS.map(k=>[k,NATIONS[k].w]));
  const name = nameFor(nat);
  const posD = detailedPos(pos);
  const pos2=[]; const prof={};
  if(posD!=="GK"){ const rel=REL_POS[posD]||[]; const n=Math.random()<0.45?1:(Math.random()<0.18?2:0); for(let i=0;i<n && rel.length;i++){ const r=pick(rel); if(r!==posD && !pos2.includes(r)) pos2.push(r); } }
  pos2.forEach(x=>{ prof[x]=round2(clamp(0.65+pairAff(posD,x)*0.35,0.65,1.0)); });   // 自带副位置=已发展到其上限（镜像位接近满级）
  const traits=genTraits(POS_LINE[posD], ovr, potential, age);
  const fv = fairValue(ovr,age)*FORMS[formIdx].mult;
  return {
    id:_id++, name, nat, pos:posD, pos2, prof, traits, morale:70, age, ovr, potential,
    potEst: clamp(potential+rint(-7,7), ovr, 99), // 未侦察时的模糊估计
    scouted:false,
    formIdx, injured:0, apps:0,
    value: round1(fv*rnd(0.9,1.12)),
    releaseClause: Math.random()<0.28 ? round1(fv*rnd(0.9,1.12)*rnd(1.7,2.8)) : null,  // 部分球员自带解约金条款
    owned:false, buyPrice:0, starter:false,
    wage:0, contractYears:0,
  };
}

function makeSchedule(n){
  const teams=[...Array(n).keys()]; if(n%2) teams.push(-1);
  const m=teams.length, rounds=[]; let arr=[...teams];
  for(let r=0;r<m-1;r++){
    const pairs=[];
    for(let i=0;i<m/2;i++){ const a=arr[i],b=arr[m-1-i]; if(a!==-1&&b!==-1) pairs.push([a,b]); }
    rounds.push(pairs); arr.splice(1,0,arr.pop());
  }
  return rounds;
}

function teamRatings(){
  const ss=slots(); const eff=[]; let cnt=0, hasGK=false; let atB=0, deB=0, ovB=0;
  ss.forEach((s,i)=>{
    const id=G.lineup?G.lineup[i]:null; if(id==null) return;
    const p=G.squad.find(x=>x.id===id); if(!p||p.injured) return;
    cnt++; if(s.pos==="GK") hasGK=true;
    eff.push({role:POS_LINE[s.pos], x:s.x, val:p.ovr*FORMS[p.formIdx].mult*posEff(p,s.pos)*moraleFac(p)});
    if(Array.isArray(p.traits)){ // 特质对球队属性的影响
      if(hasTrait(p,"poacher")) atB+=0.012; if(hasTrait(p,"playmaker")) atB+=0.02; if(hasTrait(p,"winger")) atB+=0.008; if(hasTrait(p,"aerial")) atB+=0.006;
      if(hasTrait(p,"rock")) deB+=0.02; if(hasTrait(p,"bigGame")){ atB+=0.006; deB+=0.006; } if(hasTrait(p,"leader")) ovB+=0.008;
    }
  });
  const mean=arr=>arr.length? arr.reduce((s,e)=>s+e.val,0)/arr.length:0;
  const avg=role=>mean(eff.filter(e=>e.role===role));
  const hc=(1+staffLevel("head")*0.004)*(1+clamp(ovB,0,0.05)); // 主教练 + 领袖
  const att=(avg("FW")*0.6+avg("MF")*0.4)*hc*(1+clamp(atB,0,0.12));
  const def=(avg("DF")*0.65+avg("GK")*0.35)*hc*(1+clamp(deB,0,0.12));
  const ovr=(eff.length? eff.reduce((s,e)=>s+e.val,0)/eff.length : 0)*hc;
  const wideEff=mean(eff.filter(e=>(e.role==="FW"||e.role==="MF")&&(e.x<30||e.x>70)));
  const centralEff=mean(eff.filter(e=>e.role==="MF"&&e.x>=35&&e.x<=65));
  const fwEff=mean(eff.filter(e=>e.role==="FW"));
  return {att:att||40, def:def||40, ovr:ovr||40, count:cnt, hasGK, wideEff, centralEff, fwEff};
}
function tacticMods(r, oppStr){
  const t=G.tactic||"平衡"; let att=1, def=1, note="平衡";
  const sign=b=>(b>=0?"+":"")+Math.round(b*100)+"%";
  if(t==="边路传中"){ const b=clamp((r.wideEff-70)/100,-0.1,0.15); att=1+b; note=`边路传中 ${sign(b)}`; }
  else if(t==="中路渗透"){ const b=clamp((r.centralEff-70)/100,-0.1,0.15); att=1+b; note=`中路渗透 ${sign(b)}`; }
  else if(t==="长传冲吊"){ const b=clamp((r.fwEff-70)/100,-0.1,0.15); att=1+b; note=`长传冲吊 ${sign(b)}`; }
  else if(t==="防守反击"){ def=1.08; const b=clamp((oppStr-r.ovr)/100,0,0.15); att=1+b; note=`防守反击 防+8%${b>0?` 反击+${Math.round(b*100)}%`:""}`; }
  else if(t==="高位压迫"){ att=1.06; def=1.06; note="高位压迫 攻防+6%"; }
  return {att, def, note};
}
// 匈牙利算法（最小费用完美匹配，行数 n ≤ 列数 m），返回每行分配的列索引
function hungarianAssign(a){
  const n=a.length, m=a[0].length, INF=1e15;
  const u=new Array(n+1).fill(0), v=new Array(m+1).fill(0), p=new Array(m+1).fill(0), way=new Array(m+1).fill(0);
  for(let i=1;i<=n;i++){
    p[0]=i; let j0=0;
    const minv=new Array(m+1).fill(INF), used=new Array(m+1).fill(false);
    do{
      used[j0]=true; const i0=p[j0]; let delta=INF, j1=-1;
      for(let j=1;j<=m;j++) if(!used[j]){
        const cur=a[i0-1][j-1]-u[i0]-v[j];
        if(cur<minv[j]){ minv[j]=cur; way[j]=j0; }
        if(minv[j]<delta){ delta=minv[j]; j1=j; }
      }
      for(let j=0;j<=m;j++){ if(used[j]){ u[p[j]]+=delta; v[j]-=delta; } else minv[j]-=delta; }
      j0=j1;
    } while(p[j0]!==0);
    do{ const j1=way[j0]; p[j0]=p[j1]; j0=j1; } while(j0!==0);
  }
  const ans=new Array(n).fill(-1);
  for(let j=1;j<=m;j++) if(p[j]>=1 && p[j]<=n) ans[p[j]-1]=j-1;
  return ans;
}
function autoLineup(){
  const ss=slots(); const avail=G.squad.filter(p=>!p.injured);
  G.lineup=new Array(ss.length).fill(null);
  const n=ss.length; if(!avail.length){ syncStarters(); return; }
  const m=Math.max(n, avail.length);                     // 不足 11 人时用虚拟列补齐
  const cost=[];
  for(let i=0;i<n;i++){ const row=new Array(m).fill(0); for(let j=0;j<avail.length;j++){ const p=avail[j]; row[j]=-(p.ovr*posEff(p,ss[i].pos)*(1+(FORMS[p.formIdx].mult-1)*0.15)); } cost.push(row); } // 以能力×位置熟练度为主，状态仅作微弱加权（不会让 76 火热盖过 91 冰冷）
  const ans=hungarianAssign(cost);                       // 全局最优：最大化 Σ 评分×位置熟练度(×微状态)
  for(let i=0;i<n;i++){ const j=ans[i]; if(j>=0 && j<avail.length) G.lineup[i]=avail[j].id; }
  syncStarters();
}

  syncStarters(); save(); render();
}

function allPlayers(){ const a=[...G.squad,...G.market]; rivalClubs().forEach(c=>{ if(c.squad) a.push(...c.squad); }); return a; }

// 修复存档中可能存在的重复球员 id（旧版本曾在重载后把 _id 重置为 1，导致新生成的球员与已存球员、甚至不同俱乐部之间撞号）
function dedupeIds(){
  // 1) 计数器恢复到现有最大 id 之上
  let mx=0; const bump=p=>{ if(p&&typeof p.id==="number"&&p.id>mx)mx=p.id; };
  if(Array.isArray(G.squad)) G.squad.forEach(bump);
  if(Array.isArray(G.market)) G.market.forEach(bump);
  if(Array.isArray(G.staffMarket)) G.staffMarket.forEach(bump);
  if(Array.isArray(G.table)) G.table.forEach(c=>{ if(c&&c.squad) c.squad.forEach(bump); });
  if(G.academy&&Array.isArray(G.academy.prospects)) G.academy.prospects.forEach(bump);
  if(Array.isArray(G.loans)) G.loans.forEach(o=>bump(o&&o.p));
  _id=Math.max(_id, mx+1);
  // 2) 全局去重：阵容优先保留原 id（被 lineup/training 引用），其余冲突者分配新 id → 全部球员 id 唯一
  const seen=new Set();
  const fix=p=>{ if(!p||typeof p.id!=="number") return; if(seen.has(p.id)) p.id=_id++; seen.add(p.id); };
  if(Array.isArray(G.squad)) G.squad.forEach(fix);
  if(Array.isArray(G.market)) G.market.forEach(fix);
  if(Array.isArray(G.table)) G.table.forEach(c=>{ if(c&&c.squad) c.squad.forEach(fix); });
  if(G.academy&&Array.isArray(G.academy.prospects)) G.academy.prospects.forEach(fix);
  if(Array.isArray(G.loans)) G.loans.forEach(o=>fix(o&&o.p));
  if(Array.isArray(G.staffMarket)) G.staffMarket.forEach(fix);
}
function clubStr(club){
  if(club.you) return teamRatings().ovr;
  if(!club.squad||!club.squad.length) return club.str||75;
  const best=[...club.squad].sort((a,b)=>b.ovr-a.ovr).slice(0,11);
  return best.reduce((s,p)=>s+p.ovr*FORMS[p.formIdx].mult,0)/best.length;
}
function isKeyPlayer(club,p){
  if(!club.squad) return false;
  return [...club.squad].sort((a,b)=>b.ovr-a.ovr).slice(0,11).some(x=>x.id===p.id);
}
function genRivalSquad(targetStr, nat){
  const plan=["GK","GK","DF","DF","DF","DF","DF","MF","MF","MF","MF","MF","FW","FW","FW","FW"];
  const out=[]; const outIdx=shuffle([...Array(plan.length).keys()].filter(i=>i>=2));
  const starSet=new Set(outIdx.slice(0,2));
  plan.forEach((pos,i)=>{
    const ovr = starSet.has(i)? Math.round(targetStr+rnd(2,6)) : Math.round(targetStr+rnd(-9,2));
    const useNat = (nat && NATIONS[nat] && Math.random()<0.7) ? nat : undefined;
    const pl=makePlayer(pos,{ovr:clamp(ovr,50,92), age:rint(19,33), nat:useNat});
    pl.scouted=true;
    out.push(pl);
  });
  return out;
}

// ---------- 宿敌德比 ----------
function pickRival(){
  const me=G.table.find(t=>t.you); if(!me) return null;
  const mine=clubStr(me); const pool=divClubs(myDiv()).filter(c=>!c.you);
  if(!pool.length) return null;
  pool.sort((a,b)=>Math.abs(clubStr(a)-mine)-Math.abs(clubStr(b)-mine));   // 实力最接近的同级对手=天然宿敌
  return pool[0].name;
}
function ensureRival(){
  if(!G.derby) G.derby={rival:null,w:0,d:0,l:0};
  const inDiv = G.derby.rival && divClubs(myDiv()).some(c=>!c.you && c.name===G.derby.rival);
  if(!inDiv){ const r=pickRival(); if(r && r!==G.derby.rival){ G.derby={rival:r,w:0,d:0,l:0}; } }
}
function isDerbyOpp(name){ return !!(G.derby && G.derby.rival && G.derby.rival===name); }

function nextRound(){
  if(G.finished) return;
  const r=teamRatings();
  if(r.count!==11){ toast(`需要恰好 11 名首发（当前 ${r.count} 人）`); switchTab("squad"); return; }
  if(!r.hasGK){ toast("首发必须包含 1 名门将"); switchTab("squad"); return; }

  const youIdx=G.table.findIndex(t=>t.you);
  const myD=myDiv();
  const roundIdx=(G.round-1)%G.totalRounds;
  const myLeague=G.leagueScheds.find(s=>s.country===G.country && s.div===myD);
  const myPairs=(myLeague?myLeague.sched[roundIdx]:[])||[];
  let myPair=myPairs.find(p=>p[0]===youIdx||p[1]===youIdx);
  let oppIdx, oppHome=true;
  if(myPair){ oppIdx=myPair[0]===youIdx?myPair[1]:myPair[0]; oppHome=myPair[1]===youIdx; }
  else oppIdx=divIdxs(myD).find(i=>i!==youIdx);
  const opp=G.table[oppIdx];
  const oppStr=clubStr(opp); const oppTac=opp.tactic||"平衡"; const derby=isDerbyOpp(opp.name);
  const ctx={youIdx, oppIdx, oppHome, roundIdx, myD};
  startMatch({
    comp:derby?"🔥 德比":"联赛", oppName:opp.name, derby, knockout:false, oppStr, myStr:()=>teamRatings().ovr, allowSub:true, allowTactic:true,
    getXG:()=>{ const r=teamRatings(); const tm=tacticMods(r,oppStr); let myAtt=r.att*tm.att,myDef=r.def*tm.def,oppAtt=oppStr,oppDef=oppStr;
      if(TACTIC_BEATS[G.tactic||"平衡"]===oppTac) myAtt*=1.05; else if(TACTIC_BEATS[oppTac]===(G.tactic||"平衡")) oppAtt*=1.05;
      let myXG=clamp((myAtt-oppDef)/9+1.35,0.18,5.2), opXG=clamp((oppAtt-myDef)/9+1.35,0.18,5.2);
      if((G.tactic||"平衡")==="高位压迫"){ myXG*=1.06; opXG*=1.10; } if(oppHome) myXG*=1.08; else opXG*=1.08;
      return {mxg:myXG, oxg:opXG}; },
    onFinish:(mg,og)=>resolveLeagueMatch(mg,og,ctx)
  });
}
function resolveLeagueMatch(mg,og,ctx){
  ensureRival();
  const {youIdx, oppIdx, oppHome, roundIdx, myD}=ctx; const opp=G.table[oppIdx];
  const isDerby=isDerbyOpp(opp.name);
  applyResult(youIdx,oppIdx,mg,og);
  recordMatch(mg,og,opp.name);
  creditGoals(starters(), mg); if(opp.squad) creditGoals(opp.squad, og);
  matchGrowth(starters());
  const res=mg>og?"W":mg<og?"L":"D";
  const prize=res==="W"?2.5:res==="D"?0.9:0.2;
  G.cash=round1(G.cash+prize);
  const tacInfo=`对手战术：${opp.tactic||"平衡"}`;
  // 主场门票收入（德比满座）+ 每轮商业收入
  let gate=0;
  if(oppHome && G.stadium){ const rate=clamp(attendanceRate(clubStr(opp))+(isDerby?0.15:0),0.3,1); const att=Math.round(G.stadium.capacity*rate); gate=round1(att*G.stadium.ticketPrice/1e6); G.stadium.lastAtt=att; G.stadium.lastRate=rate; G.stadium.lastGate=gate; G.cash=round1(G.cash+gate); }
  const commercial=commercialIncome(); if(commercial) G.cash=round1(G.cash+commercial);

  // 出场记录（首发本轮 +1 app，用于成长）
  starters().forEach(p=>p.apps++);

  // 全世界各国联赛同步进行，模拟其它所有比赛
  G.leagueScheds.forEach(L=>{
    const pairs=(L.sched[roundIdx])||[];
    pairs.forEach(pr=>{
      if(L.country===G.country && L.div===myD && (pr[0]===youIdx||pr[1]===youIdx)) return;
      const A=G.table[pr[0]],B=G.table[pr[1]]; const aS=clubStr(A),bS=clubStr(B);
      const ag=samplePoisson(clamp((aS-bS)/9+1.4,0.2,5)), bg=samplePoisson(clamp((bS-aS)/9+1.4,0.2,5));
      applyResult(pr[0],pr[1],ag,bg);
      if(L.country===G.country && L.div===myD){ if(A.squad) creditGoals(A.squad,ag); if(B.squad) creditGoals(B.squad,bg); }
    });
  });

  evolveMarket();
  resolveScouts();
  aiTransfers();
  // 国家队邀约随时间滚动刷新（未任职时每 3 轮变化一次）
  if(G.national && !G.national.nation && G.round%3===0){ genNTInvites(); pushNews(`📣 国家队邀约更新（见「🌐 国家队」）。`,"match"); }

  // 工资支出（球员 + 在租 + 教练组）
  const wb=round2(wageBill()+loanWageBill()+staffWageBill()); const inc=sponsorIncome(); G.lastWageBill=wb; G.cash=round1(G.cash-wb+inc);

  const resTxt=res==="W"?"赢球":res==="L"?"输球":"战平";
  const gateTxt = gate? `；🏟️ 主场门票 +${eur(gate)}（${G.stadium.lastAtt.toLocaleString()} 人 · ${Math.round(G.stadium.lastRate*100)}%）` : "";
  pushNews(`<b>${G.club} ${mg}-${og} ${opp.name}</b> · ${resTxt}，奖金 +${eur(prize)}${commercial?`；商业 +${eur(commercial)}`:""}${gateTxt}；工资 -${eur(wb)}`,"match");
  if(G.cash<0) pushNews(`⚠️ 现金为负（${eur(G.cash)}）！工资压力过大，尽快卖人回血。`,"bad");

  // 士气：随胜负 / 出场时间 / 处境浮动（高于全队水准却坐板凳的球员会不满）
  const myOvr=teamRatings().ovr;
  G.squad.forEach(p=>{
    let dm = res==="W"?2 : res==="L"?-1.6 : 0.3;
    if(p.starter) dm+=1.2; else dm += (p.ovr>=myOvr-1? -2.2 : -0.4);
    if(p.wantOut) dm-=1;
    dm += G.board>=70?0.4 : (G.board<=30?-0.6:0);
    p.morale=clamp((p.morale==null?70:p.morale)+dm,0,100);
    if(p.morale<24 && !p.wantOut && Math.random()<0.25){ p.wantOut=true; pushNews(`😡 <b>${p.name}</b> 对处境强烈不满，要求转会！`,"bad"); }
    if(p.morale>55 && p.wantOut) p.wantOut=false;
  });
  // 董事会信心：胜负 + 排名是否达预期
  const rk=myRank();
  let bd = res==="W"?3 : res==="D"?0.6 : -3;
  if(res==="W" && clubStr(opp)>myOvr) bd+=1.5;
  if(res==="L" && clubStr(opp)<myOvr-3) bd-=1.5;
  if(rk<=G.goalRank) bd+=0.6; else if(rk>G.goalRank+2) bd-=0.9;
  if(isDerby) bd*=2;                       // 德比胜负对董事会影响翻倍
  updateBoard(bd);
  if(isDerby){                             // 德比额外影响：战绩记录 + 士气 + 声望 + 新闻
    if(res==="W"){ G.derby.w++; squadMoraleDelta(5); G.rep=clamp((G.rep||50)+1,0,100); pushNews(`🔥 <b>德比大胜！</b>击败宿敌 ${opp.name} ${mg}-${og}，全队士气高涨，声望提升！`,"good"); }
    else if(res==="L"){ G.derby.l++; squadMoraleDelta(-5); pushNews(`🔥 <b>德比落败……</b>不敌宿敌 ${opp.name} ${og}-${mg}，更衣室低落，球迷不满。`,"bad"); }
    else { G.derby.d++; pushNews(`🔥 德比战与宿敌 ${opp.name} ${mg}-${og} 握手言和。`,"match"); }
  }
  if(G.board<=18 && G.board>10 && !G.boardWarned){ G.boardWarned=true; pushNews(`⚠️ 董事会发出<b>最后通牒</b>：再不改善成绩，赛季结束你将被解雇！`,"bad"); }

  const finalRound=(G.round>=G.totalRounds);
  G.round++;
  const _mid=Math.ceil(G.totalRounds/2);
  if(G.round-1===_mid && G.academy){ generateIntake(); pushNews(`🌱 年中青训营开营，迎来一批新苗子（学院 Lv.${G.academy.level}）。`,"good"); }
  if(G.round>G.totalRounds){ endSeason(); }
  G.squad.forEach(p=>{ if(p.injured&&p.starter) p.starter=false; });
  save(); render();
  if(!G.finished && G.liveMatch===false) showMatchModal(opp.name,mg,og,res,prize,wb,tacInfo);
  if(!finalRound && !G.finished) maybeRandomEvent();   // 随机剧情（赛季末轮不触发，避免与赛季弹窗冲突）
}
function applyResult(i,j,gi,gj){
  const A=G.table[i],B=G.table[j];
  A.P++;B.P++;A.GF+=gi;A.GA+=gj;B.GF+=gj;B.GA+=gi;
  if(gi>gj){A.W++;B.L++;A.pts+=3;} else if(gi<gj){B.W++;A.L++;B.pts+=3;} else{A.D++;B.D++;A.pts++;B.pts++;}
}

// 市场演化
function evolveMarket(){
  const all=allPlayers();
  const med=staffLevel("med") + ((G.facil&&G.facil.medical)?G.facil.medical*0.7:0);   // 队医 + 医疗中心叠加
  all.forEach(p=>{
    if(p.injured>0) p.injured--;
    if(p.owned && med && p.injured>0 && Math.random()<0.12*med) p.injured--;  // 加快康复
    if(Math.random()<0.45) p.formIdx=clamp(p.formIdx+(Math.random()<0.5?-1:1),0,4);
    let injChance = p.owned ? 0.04*Math.max(0.2,1-0.12*med) : 0.04;            // 降低受伤概率（封底20%）
    if(hasTrait(p,"fragile")) injChance*=1.9;                                   // 玻璃人更易伤
    if(p.injured===0 && Math.random()<injChance){ p.injured=rint(1,3); p.formIdx=clamp(p.formIdx-1,0,4); }
    const fair=fairValue(p.ovr,p.age)*FORMS[p.formIdx].mult*(p.injured?0.78:1);
    p.value=round1(clamp((p.value*0.55+fair*0.45)*rnd(0.96,1.05),0.15,9999));
    if(p.owned){ if(!Array.isArray(p.valHist)) p.valHist=[]; p.valHist.push(p.value); if(p.valHist.length>40) p.valHist.shift(); } // 身价历史曲线
  });
  for(let k=0,n=rint(1,2);k<n;k++){
    const p=pick(all), e=Math.random();
    if(e<0.33){ p.formIdx=4; p.value=round1(p.value*rnd(1.12,1.28));
      pushNews(`🔥 <b>${p.name}</b>（${POS_CN[p.pos]}）状态爆棚，身价飙升至 ${eur(p.value)}！`,"good");
    } else if(e<0.6){ p.injured=rint(2,4); p.value=round1(p.value*rnd(0.72,0.85)); p.formIdx=clamp(p.formIdx-2,0,4);
      pushNews(`🤕 <b>${p.name}</b> 遭遇伤病（${p.injured}轮），身价跌至 ${eur(p.value)}。`,"bad");
    } else { const up=Math.random()<0.6; p.value=round1(p.value*(up?rnd(1.06,1.15):rnd(0.88,0.96)));
      pushNews(`📣 <b>${p.name}</b> 传出转会绯闻，身价${up?"上涨":"下滑"}至 ${eur(p.value)}。`,up?"good":"bad");
    }
  }
  if(Math.random()<0.6){
    G.market.sort(()=>Math.random()-0.5);
    const out=rint(1,2); G.market.splice(0,out);
    for(let i=0;i<out;i++) G.market.push(mkFreeMaybe(makePlayer(pick(POS), Math.random()<0.2?rnd(3,8):0)));
  }
}

// 对手转会活动：抢人 / 报价你的球员 / 挂牌出售
function aiTransfers(){
  const rivals=rivalClubs().filter(c=>c.squad);   // 仅已生成阵容的俱乐部参与转会
  if(!rivals.length) return;
  // 0) 别队触发你球员的解约金（条款偏低=划算 → 更可能被挖走）
  if(G.squad.length>12){
    G.squad.slice().forEach(p=>{
      if(!p.releaseClause || p.starter===undefined) return;
      const bargain=p.releaseClause < p.value*1.7;           // 解约金低于身价1.7倍才算划算
      const prob=(bargain?0.05:0.012)*(p.ovr>=82?1.5:1);
      if(Math.random()<prob){
        const buyer=pick(rivals.filter(c=>clubStr(c)>=p.ovr-5 && c.squad.length<24));
        if(!buyer||G.squad.length<=11) return;
        const fee=p.releaseClause; G.cash=round1(G.cash+fee);
        noteSale(p,fee); inductHOF(p,false);
        const i=G.squad.findIndex(x=>x.id===p.id); if(i<0) return;
        p.owned=false; p.starter=false; p.wage=0; p.contractYears=0; p.releaseClause=null; untrain(p.id); removeFromLineup(p.id);
        G.offers=(G.offers||[]).filter(o=>o.playerId!==p.id);
        G.squad.splice(i,1); buyer.squad.push(p); buyer.str=round1(clubStr(buyer));
        squadMoraleDelta(-2);
        pushNews(`💸 <b>${buyer.name}</b> 触发了 <b>${p.name}</b> 的解约金（${eur(fee)}），将其签走！`,"bad");
      }
    });
  }
  // 1) 对手从市场签人（抢你的目标，真实进入对手阵容）
  let signings=rint(0,2);
  for(let s=0;s<signings;s++){
    const club=pick(rivals); if(club.squad.length>=22) continue;
    const cs=clubStr(club);
    const targets=G.market.filter(p=>p.ovr>=cs-2 && !p.injured).sort((a,b)=>b.ovr-a.ovr);
    if(!targets.length) continue;
    const p=targets[rint(0,Math.min(4,targets.length-1))];
    const i=G.market.findIndex(x=>x.id===p.id); if(i<0) continue;
    const fee=round1(askingFee(p));
    G.market.splice(i,1);
    G.scoutQueue=G.scoutQueue.filter(q=>q.id!==p.id);
    p.free=false;
    club.squad.push(p);
    G.market.push(mkFreeMaybe(makePlayer(pick(POS), Math.random()<0.2?rnd(3,8):0)));
    pushNews(`🔻 <b>${club.name}</b> 抢先签下 <b>${p.name}</b>（${p.ovr}评分，${eur(fee)}）。`,"bad");
  }
  // 2) 对手挂牌出售（把自己阵容里的边缘球员真实地放进市场）
  if(Math.random()<0.55){
    const club=pick(rivals);
    if(club.squad.length>15){
      const fringe=[...club.squad].sort((a,b)=>a.ovr-b.ovr).slice(0, club.squad.length-11);
      if(fringe.length){
        const p=pick(fringe);
        const idx=club.squad.findIndex(x=>x.id===p.id); club.squad.splice(idx,1);
        p.free=false;
        G.market.unshift(p);
        pushNews(`🔄 <b>${club.name}</b> 挂牌出售 <b>${p.name}</b>（${p.ovr}评分），已进入转会市场。`,"match");
      }
    }
  }
  // 3) 对手报价你的球员（先清理过期/已离队的报价）
  G.offers=(G.offers||[]).filter(o=>{
    o.expires--;
    if(o.expires<=0){ pushNews(`⌛ ${o.fromClub} 对 ${o.playerName} 的报价已过期。`,"match"); return false; }
    return G.squad.some(p=>p.id===o.playerId);
  });
  let candidates=G.squad.filter(p=>!G.offers.some(o=>o.playerId===p.id));
  let nOffers=(Math.random()<0.5?1:0)+(Math.random()<0.2?1:0);
  for(let k=0;k<nOffers && candidates.length;k++){
    candidates.sort((a,b)=>(b.value*(1+(b.formIdx-2)*0.05))-(a.value*(1+(a.formIdx-2)*0.05)));
    const idx=rint(0,Math.min(3,candidates.length-1));
    const p=candidates[idx]; candidates.splice(idx,1);
    const club=pick(rivals);
    const amount=round1(p.value*rnd(0.95,1.45)*(1+(p.formIdx-2)*0.06));
    G.offers.push({playerId:p.id, playerName:p.name, fromClub:club.name, amount, expires:2});
    pushNews(`📨 <b>${club.name}</b> 报价 <b>${eur(amount)}</b> 求购你的 <b>${p.name}</b>（身价 ${eur(p.value)}）。`,"good");
  }
  // 市场上限，避免无限膨胀
  while(G.market.length>46){ G.market.sort((a,b)=>a.value-b.value); G.market.shift(); }
  rivals.forEach(c=>c.str=round1(clubStr(c)));
}

// 球探队列推进
function resolveScouts(){
  const done=[];
  G.scoutQueue.forEach(s=>{ s.roundsLeft--; if(s.roundsLeft<=0) done.push(s.id); });
  G.scoutQueue=G.scoutQueue.filter(s=>s.roundsLeft>0);
  done.forEach(id=>{
    const p=findPlayer(id);
    if(p){ p.scouted=true;
      pushNews(`🔭 球探报告：<b>${p.name}</b>（${p.age}岁 ${POS_CN[p.pos]}）潜力 <b>${p.potential}</b>${isWonder(p)?" — ⭐妖人！":""}`,"scout");
    }
  });
}

function endSeason(){
  const finishDiv=myDiv();
  const sorted=divClubs(finishDiv).sort(cmpTable);
  const rank=sorted.findIndex(t=>t.you)+1;
  const bonus=round1((rank===1?40:rank===2?21:rank===3?12:rank<=5?5:1.5)*(myDiv()===0?1.55:0.9)); // 冠军奖金更高，按联赛级别加权
  const transferBudget=round1((9-Math.min(rank,8))*rnd(3,6) + G.rep*0.2);
  G.rep=clamp(G.rep + (rank===1?10:rank<=3?6:rank<=G.goalRank?3:-2), 0, 100);
  updateBoard(rank===1?22: rank<=3?13: (rank<=G.goalRank?9: (rank>G.goalRank+3?-26:-13))); // 赛季考核：董事会信心大幅波动
  G.seasonsAtClub=(G.seasonsAtClub||1)+1;
  G.cash=round1(G.cash+bonus+transferBudget);
  pushNews(`💰 下赛季董事会拨款：联赛奖金 ${eur(bonus)} + 转会预算 ${eur(transferBudget)}（当前声望 ${Math.round(G.rep)}）。`,"good");
  const metGoal = rank<=G.goalRank;
  pushNews(`🏁 第 ${G.season} 赛季结束！最终第 ${rank} 名（目标前 ${G.goalRank}）— ${metGoal?"达成预期 ✅":"未达预期 ⚠️"}，赛季奖金 +${eur(bonus)}。`, metGoal?"good":"bad");
  if(rank===1){ const t=`${flagOf(G.country)}${G.country} ${DIV_NAMES[finishDiv]||'联赛'} 冠军`; addHonor(t); pushNews(`🏆 ${t}！`,"good"); celebrate({trophy:"🏆", title:`${DIV_NAMES[finishDiv]||'联赛'} 冠军`, sub:`${flagOf(G.country)} ${G.club}`, meta:`第 ${G.season} 赛季 · 联赛登顶 · 奖金 +${eur(bonus)}`}); }

  recordSeasonScorer();   // 记录当季最佳射手（重置数据前）
  // 赛季末：你的球员靠每场比赛动态成长（matchGrowth），此处只老化 + 训练加成 + 兜底衰退；世界球员（无逐场模拟）整体结算
  allPlayers().forEach(p=>{
    p.age++;
    const gap=p.potential-p.ovr;
    if(p.owned){
      const inT=G.training.includes(p.id);
      if(inT && p.age<=27 && gap>0) p.ovr=clamp(p.ovr+rint(0,1)+(G.coachLevel>=2?1:0),48,99); // 训练额外加成
      if(p.age>=31 && !inT && Math.random()<0.4) p.ovr=clamp(p.ovr-rint(0,1),42,99);          // 老将自然衰退
      if(inT && p.learnPos && p.pos!==p.learnPos){   // 训练改造位置：逐季提升，速度/上限取决于与现有位置的相似度
        if(!p.prof) p.prof={}; if(!Array.isArray(p.pos2)) p.pos2=[];
        const tgt=p.learnPos, aff=learnAff(p,tgt), cap=masteryCap(p,tgt);
        const gain=clamp(aff*aff*0.7+0.06, 0.06, 0.78);   // 相似位掉得快(镜像≈1季)，跨线很慢
        const cur=(p.prof[tgt]!=null)?p.prof[tgt]:structEff(p,tgt);
        const nv=round2(Math.min(cap, cur+gain)); p.prof[tgt]=nv;
        if(!p.pos2.includes(tgt)) p.pos2.push(tgt);
        if(nv>=cap-0.02){ pushNews(`🎓 <b>${p.name}</b> 完全掌握了 ${POS_CN[tgt]}（熟练度 ${Math.round(nv*100)}%）。`,"good"); p.learnPos=null; }
        else pushNews(`📈 <b>${p.name}</b> 改造 ${POS_CN[tgt]} 中（熟练度 ${Math.round(nv*100)}%，可继续训练）。`,"match");
      }
    } else {
      if(p.age<=23 && gap>0) p.ovr=clamp(p.ovr+Math.round(gap*rnd(0.16,0.36)),48,99);
      else if(p.age<=27 && gap>0 && Math.random()<0.5) p.ovr=clamp(p.ovr+rint(0,2),48,99);
      else if(p.age>=30) p.ovr=clamp(p.ovr-rint(0,3),42,99);
    }
    if(p.owned){ p.clubApps=(p.clubApps||0)+(p.apps||0); p.clubGls=(p.clubGls||0)+(p.gls||0); p.clubAst=(p.clubAst||0)+(p.ast||0); if(Math.random()<retireChance(p)) p._retire=true; }  // 累计队史数据 + 退役意愿（用本季出场判断）
    p.apps=0; p.gls=0; p.ast=0;
    p.value=round1(fairValue(p.ovr,p.age)*FORMS[p.formIdx].mult);
    if(p.owned) p.wage=wageDemand(p.ovr);
  });
  G.squad.slice().forEach(p=>{ if(p._retire){ delete p._retire; retirePlayer(p); } });   // 球员自主退役（含名人堂入选）

  // 合同 -1，到期处理
  const leaving=[];
  G.squad.forEach(p=>{
    p.contractYears--;
    if(p.contractYears<=0){
      if(G.squad.length-leaving.length>11) leaving.push(p.id);
      else p.contractYears=1; // 人数不足，自动续 1 年
    }
  });
  leaving.forEach(id=>{
    const i=G.squad.findIndex(p=>p.id===id); if(i<0) return;
    const p=G.squad[i]; inductHOF(p,false); p.owned=false; p.starter=false; p.wage=0; p.free=true; untrain(id); removeFromLineup(id);
    G.market.unshift(p); G.squad.splice(i,1);
    pushNews(`📄 <b>${p.name}</b> 合同到期，自由身离队。`,"bad");
  });

  // 青训学院：苗子成长、毕业（19岁离队）、新一批入学
  if(G.academy){
    G.academy.prospects.forEach(p=>{ p.age++; const gap=p.potential-p.ovr; if(gap>0) p.ovr=clamp(p.ovr+Math.round(gap*rnd(0.15,0.35)),44,99); });
    G.academy.prospects=G.academy.prospects.filter(p=>p.age<=18);
    generateIntake();
    pushNews(`🌱 赛季末青训营：新一批苗子入营（学院 Lv.${G.academy.level}）。`,"good");
  }
  // 租借球员归队（获得成长）
  if(G.loans && G.loans.length){
    G.loans.forEach(o=>{ const p=o.p; p.age++; const gap=p.potential-p.ovr;
      if(p.age<=23 && gap>0) p.ovr=clamp(p.ovr+Math.round(gap*rnd(0.20,0.40)),48,99);
      else if(p.age>=30) p.ovr=clamp(p.ovr-rint(0,2),42,99);
      p.value=round1(fairValue(p.ovr,p.age)*FORMS[p.formIdx].mult);
      p.owned=true; p.wage=wageDemand(p.ovr); if(!p.contractYears) p.contractYears=1;
      G.squad.push(p);
    });
    pushNews(`🤝 ${G.loans.length} 名租借球员赛季末归队（获得了成长）。`,"good"); G.loans=[];
  }
  // 赞助：先发放本赛季绩效奖金，再续期/到期
  ensureSponsorSlots();
  paySponsorBonuses({ league: rank===1, conti: (qualifyTier(rank, finishDiv)!=null), cup: !!G._wonCup });
  SPONSOR_TKEYS.forEach(t=>{ const s=G.sponsorSlots[t]; if(s){ s.seasonsLeft--; if(s.seasonsLeft<=0){ pushNews(`💼 ${SPONSOR_TYPES[t].name} ${s.brand} 合约到期。`,"match"); G.sponsorSlots[t]=null; } } });
  if(Array.isArray(G.partners)){ G.partners.forEach(s=>s.seasonsLeft--); G.partners=G.partners.filter(s=>s.seasonsLeft>0); }
  G._wonCup=false;
  // 转会分期付款本季扣款
  if(Array.isArray(G.installments) && G.installments.length){ let paid=0; G.installments.forEach(it=>{ paid+=it.perSeason; it.seasonsLeft--; }); G.installments=G.installments.filter(it=>it.seasonsLeft>0); if(paid>0){ G.cash=round1(G.cash-paid); pushNews(`💳 转会分期付款本季支出 -${eur(round1(paid))}（尚余 ${G.installments.length} 笔）。`,"match"); } }
  repayDebtsSeason();   // 银行贷款本季还款
  genSponsorOffers();
  refreshStaffMarket();   // 新赛季教练市场刷新
  genJobOffers(rank);
  // 转会窗口：一批自由球员进入市场（无转会费）
  const faN=rint(4,7);
  for(let i=0;i<faN;i++){
    const veteran=Math.random()<0.5;
    const p=makePlayer(pick(POS), veteran?-2:(Math.random()<0.3?rnd(2,7):0));
    if(veteran){ p.age=rint(30,35); p.value=round1(fairValue(p.ovr,p.age)*FORMS[p.formIdx].mult); p.scouted=true; }
    p.free=true; G.market.unshift(p);
  }
  pushNews(`📋 转会窗口开启：${faN} 名自由球员进入市场（无转会费，可直接谈合同）。`,"match");
  if(G.national && !G.national.nation) genNTInvites();
  rivalClubs().forEach(c=>{ if(c.squad) c.str=round1(clubStr(c)); });
  applyPromotionRelegation();
  const wccQualify = !!(G.conti && G.conti.wonTier!=null);  // 洲际冠军 → 下赛季世俱杯
  if(G.conti){ let nt=qualifyTier(rank, finishDiv); if(G.conti.wonTier!=null) nt=0; /* 卫冕：洲际冠军下赛季继续顶级洲际赛事 */ G.conti.tier=nt; G.conti.wonTier=null; G.conti.comp=null; }
  if(G.wcc){ G.wcc.in=wccQualify; G.wcc.comp=null; }
  G.season++; G.round=1;
  G.table.forEach(t=>{t.P=t.W=t.D=t.L=t.GF=t.GA=t.pts=0;});
  buildSchedules();
  divClubs(myDiv()).forEach(ensureSquad);
  ensureRival();                          // 升降级后校验/重选宿敌
  startCup(); G.midweekDone=false;
  if(G.conti && G.conti.tier!=null) startConti();                       // 洲际杯自动加入当季赛程
  if(G.wcc && G.wcc.in) startWCC();                                     // 世俱杯自动加入当季赛程
  if(G.national && G.national.nation){ G.national.comp=null; startStage(G.national.nextStage||"contQual"); } // 国家队赛事自动开始
  G.leagueViewDiv=myDiv();
  if(G.board<=10) getSacked();           // 赛季考核不过关 → 解雇（须接手新球队继续生涯）
  else showSeasonModal(rank,bonus);
}
function cmpTable(a,b){ return b.pts-a.pts || (b.GF-b.GA)-(a.GF-a.GA) || b.GF-a.GF; }

// ---------- 球探 ----------
function sendScout(id){
  const p=findPlayer(id); if(!p) return;
  if(p.scouted){ toast("已掌握该球员潜力"); return; }
  if(G.scoutQueue.find(s=>s.id===id)){ toast("球探正在考察中…"); return; }
  if(G.scoutQueue.length>=G.scoutCapacity){ toast(`球探已满（${G.scoutCapacity}个名额），等考察完成`); return; }
  if(G.cash<G.scoutFee){ toast("现金不足支付球探费"); return; }
  G.cash=round1(G.cash-G.scoutFee);
  G.scoutQueue.push({id, name:p.name, roundsLeft:1});
  toast(`已派球探考察 ${p.name}（${eur(G.scoutFee)}），下一轮出报告`);
  save(); render();
}

// ---------- 交易（谈判买入 / 即时卖出） ----------
function askingFee(p){ return round1(p.value*clamp(1.05+(p.formIdx-2)*0.06+rnd(-0.03,0.06),0.9,1.5)); }
function dealPlayer(){
  const d=pendingDeal; if(!d) return null;
  if(d.fromRival){ const c=G.table.find(t=>t.name===d.fromRival); return c&&c.squad?c.squad.find(x=>x.id===d.id):null; }
  return G.market.find(x=>x.id===d.id);
}
let negPlan=0;   // 转会付款方式：0=一次性，N=分 N 季
function setNegPlan(n){ negPlan=n; [0,2,3].forEach(k=>{ const b=document.getElementById("planBtn"+k); if(b) b.className="btn sm"+(k===n?"":" ghost"); }); syncNeg(); }
function planUpfront(fee){ const agent=round1(fee*0.08); return negPlan>0 ? round1(fee*0.4+agent) : round1(fee+agent); }   // 即时支出
function openNegotiation(id){
  const fromRival=clubOf(id);
  const p = fromRival ? fromRival.squad.find(x=>x.id===id) : G.market.find(x=>x.id===id);
  if(!p) return;
  if(squadCount()>=SQUAD_MAX){ toast(`阵容已满（含租出，上限 ${SQUAD_MAX} 人），先卖人`); return; }
  if(fromRival && fromRival.squad.length<=12){ toast(`${fromRival.name} 阵容人数不足，不愿放人`); return; }
  negPlan=0;
  const key = fromRival? isKeyPlayer(fromRival,p) : false;
  const free = !fromRival && !!p.free;
  const clauseBtn = (p.releaseClause && p.releaseClause<=G.cash) ? `<button class="btn" style="width:100%;margin-bottom:10px;background:#3a2c20;border-color:var(--gold)" onclick="signByClause(${p.id})">💸 支付解约金 ${eur(p.releaseClause)} 直接签下（免谈判）</button>` : (p.releaseClause?`<div class="hint" style="margin-bottom:8px">该球员有解约金条款 ${eur(p.releaseClause)}（现金不足以触发）</div>`:"");
  const ask = fromRival
    ? round1(p.value*clamp(1.25+(key?0.35:0)+(p.formIdx-2)*0.06+rnd(0,0.1),1.1,2.3))
    : (free?0:askingFee(p));
  const askW=wageDemand(p.ovr);
  pendingDeal={id, ask, askW, free, fromRival: fromRival?fromRival.name:null};
  const srcLabel = fromRival
    ? `来自 <b>${fromRival.name}</b>${key?" · 核心球员，要价更高":""}`
    : "自由市场";
  showOverlay(`
    <h2>💬 转会谈判 · ${NATIONS[p.nat].flag} ${p.name}</h2>

function syncNeg(){
  const fee=+$("#negFee").value, wage=+$("#negWage").value, years=+$("#negYears").value;

  const row=$("#negPlanInfoRow"), info=$("#negPlanInfo");
  if(row&&info){ if(negPlan>0){ const deferred=round1(fee*0.6*1.08); row.style.display=""; info.textContent=`${eur(deferred)}（每季 ${eur(round1(deferred/negPlan))} × ${negPlan}）`; } else row.style.display="none"; }
}
function submitOffer(){
  const p=dealPlayer(); if(!p) return;
  const fee=+$("#negFee").value, wage=+$("#negWage").value, years=+$("#negYears").value;
  const {ask,askW}=pendingDeal;
  if(planUpfront(fee)>G.cash){ toast("现金不足支付首付/佣金"); return; }
  const feeLow = fee<ask*0.85, wageLow = wage<askW*0.92;
  if(fee<ask*0.7 || wage<askW*0.8){ // 太低 → 破裂
    closeOverlay(); toast("报价过低，谈判破裂 ❌");
    pushNews(`❌ 与 <b>${p.name}</b> 的谈判破裂（报价过低）。`,"bad"); return;
  }
  if(!feeLow && !wageLow){ completeSigning(p,fee,wage,years,negPlan); return; }
  // 还价
  const cFee=round1(Math.max(fee, ask*0.96)), cWage=round2(Math.max(wage, askW));
  pendingDeal={...pendingDeal, cFee, cWage, years, plan:negPlan};
  const cTotal=round1(cFee*1.08);
  const afford=cTotal<=G.cash;
  showOverlay(`
    <h2>📨 对方还价</h2>
    <p>${p.name} 一方拒绝了你的初始报价，提出如下条件：</p>
    <div class="negbox">
      <div class="l"><span>转会费</span><b style="color:var(--gold)">${eur(cFee)}</b></div>
      <div class="l"><span>周薪</span><b>${eur(cWage)}/轮</b></div>
      <div class="l"><span>合同</span><b>${years} 年</b></div>
      <div class="l"><span>含佣金总支出</span><b style="color:var(--gold)">${eur(cTotal)}</b></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn big" style="flex:1" ${afford?"":"disabled"} onclick="acceptCounter()">${afford?"接受还价 ✓":"现金不足"}</button>
      <button class="btn ghost" style="flex:1" onclick="closeOverlay()">放弃</button>
    </div>`);
}
function acceptCounter(){
  const p=dealPlayer(); if(!p) return;
  completeSigning(p, pendingDeal.cFee, pendingDeal.cWage, pendingDeal.years, pendingDeal.plan||0);
}
function completeSigning(p,fee,wage,years,plan){
  plan=plan||0;
  const upfront=planUpfront(fee);
  if(upfront>G.cash){ toast("现金不足支付首付/佣金"); return; }
  if(pendingDeal.fromRival){
    const club=G.table.find(t=>t.name===pendingDeal.fromRival);
    const idx=club&&club.squad?club.squad.findIndex(x=>x.id===p.id):-1;
    if(idx<0){ toast("该球员已不在该队"); closeOverlay(); return; }
    club.squad.splice(idx,1);
    G.cash=round1(G.cash-upfront);
    club.str=round1(clubStr(club));
    pushNews(`✍️ <b>${G.club}</b> 从 <b>${pendingDeal.fromRival}</b> 挖来 <b>${p.name}</b>（${eur(fee)}${plan>0?`，分${plan}季`:''}，周薪 ${eur(wage)}/轮，${years}年）。`,"good");
  } else {
    const i=G.market.findIndex(x=>x.id===p.id); if(i<0){ toast("该球员已不在市场"); closeOverlay(); return; }
    G.cash=round1(G.cash-upfront);
    G.market.splice(i,1);
    G.market.push(mkFreeMaybe(makePlayer(pick(POS), Math.random()<0.2?rnd(3,8):0)));
    pushNews(`✍️ <b>${G.club}</b> 签下 <b>${p.name}</b>（${eur(fee)}${plan>0?`，分${plan}季`:''}，周薪 ${eur(wage)}/轮，${years}年）。`,"good");
  }
  if(plan>0){ const deferred=round1(fee*0.6*1.08); if(!Array.isArray(G.installments)) G.installments=[]; G.installments.push({name:p.name, perSeason:round1(deferred/plan), seasonsLeft:plan}); pushNews(`💳 分期：余款 ${eur(deferred)} 分 ${plan} 季支付（每季 ${eur(round1(deferred/plan))}）。`,"match"); }
  p.owned=true; p.free=false; p.buyPrice=fee; p.wage=round2(wage); p.contractYears=years; p.starter=false;
  p.joinedSeason=G.season; p.clubApps=0; p.clubGls=0; p.clubAst=0; p._hof=false;
  noteSigning(p,fee);
  G.squad.push(p);
  closeOverlay();
  toast(`签下 ${p.name}！转会费 ${eur(fee)} + 佣金，周薪 ${eur(wage)}`);
  save(); render();
}
function signByClause(id){
  const fromRival=clubOf(id);
  const p=fromRival? fromRival.squad.find(x=>x.id===id) : G.market.find(x=>x.id===id);
  if(!p||!p.releaseClause) return;
  if(squadCount()>=SQUAD_MAX){ toast(`阵容已满（含租出，上限 ${SQUAD_MAX} 人）`); return; }
  if(p.releaseClause>G.cash){ toast("现金不足支付解约金"); return; }
  const wage=wageDemand(p.ovr), years=rint(3,4), clause=p.releaseClause;
  if(fromRival){ const idx=fromRival.squad.findIndex(x=>x.id===id); if(idx<0){toast("该球员已不在该队");closeOverlay();return;} fromRival.squad.splice(idx,1); fromRival.str=round1(clubStr(fromRival)); }
  else { const i=G.market.findIndex(x=>x.id===id); if(i<0){toast("该球员已不在市场");closeOverlay();return;} G.market.splice(i,1); G.market.push(mkFreeMaybe(makePlayer(pick(POS), Math.random()<0.2?rnd(3,8):0))); }
  G.cash=round1(G.cash-clause);
  p.owned=true; p.free=false; p.buyPrice=clause; p.wage=round2(wage); p.contractYears=years; p.starter=false;
  p.joinedSeason=G.season; p.clubApps=0; p.clubGls=0; p.clubAst=0; p._hof=false; noteSigning(p,clause); p.releaseClause=null;
  G.squad.push(p); closeOverlay();
  toast(`支付解约金签下 ${p.name}！`);
  pushNews(`💸 触发解约金签下 <b>${p.name}</b>（${eur(clause)}，免谈判）。`,"good");
  save(); render();
}
function openClause(id){
  const p=G.squad.find(x=>x.id===id); if(!p) return;
  const lo=round1(p.value*1.3), hi=round1(p.value*3.5);
  G._clause={id, val: p.releaseClause? clamp(p.releaseClause,lo,hi) : round1(p.value*2)};
  showOverlay(`<h2 style="text-align:center">🔓 解约金 · ${p.name}</h2>
    <div class="hint" style="text-align:center;margin:-4px 0 8px">身价 ${eur(p.value)}。解约金越低，球员越有安全感（士气↑），但别队更可能低价触发挖走；越高越安全但球员无感。</div>
    <div class="negbox"><div class="l"><span>解约金</span><b id="clVal"></b></div><div class="l"><span>球员态度</span><b id="clMood"></b></div></div>
    <div class="field"><input type="range" min="${lo}" max="${hi}" step="0.5" value="${G._clause.val}" oninput="setClause(this.value)"></div>

    <button class="btn ghost" style="width:100%;margin-top:8px" onclick="G._clause=null;closeOverlay()">取消</button>`,true);

}
function setClause(v){ if(G._clause){ G._clause.val=round1(+v); syncClause(); } }
function syncClause(){ const c=G._clause; if(!c) return; const p=G.squad.find(x=>x.id===c.id); if(!p) return; const ratio=c.val/Math.max(0.1,p.value);
  const mood = ratio<=1.6?'<span style="color:var(--up)">很满意（士气↑↑，但易被挖）</span>': ratio<=2.2?'<span style="color:var(--gold)">较满意（士气↑）</span>':'<span class="hint">无感（条款偏高）</span>';
  const set=(id,h)=>{const e=document.getElementById(id); if(e) e.innerHTML=h;}; set("clVal",eur(c.val)); set("clMood",mood);
}
function confirmClause(){ const c=G._clause; if(!c) return; const p=G.squad.find(x=>x.id===c.id); if(!p){ closeOverlay(); return; }
  p.releaseClause=round1(c.val); const ratio=c.val/Math.max(0.1,p.value); const mb=ratio<=1.6?6:ratio<=2.2?3:1;
  p.morale=clamp((p.morale==null?70:p.morale)+mb,0,100); G._clause=null; closeOverlay();
  toast(`已设置 ${p.name} 解约金 ${eur(p.releaseClause)}`); pushNews(`🔓 为 <b>${p.name}</b> 设置解约金 ${eur(p.releaseClause)}（士气 +${mb}）。`,"match"); save(); render();
}
function clearClause(id){ const p=G.squad.find(x=>x.id===id); if(p) p.releaseClause=null; G._clause=null; closeOverlay(); toast("已清除解约金"); save(); render(); }
function sell(id){
  const i=G.squad.findIndex(p=>p.id===id); if(i<0) return;
  if(G.squad.length<=11){ toast("阵容不能少于 11 人"); return; }
  const p=G.squad[i];
  const sale=round1(p.value*0.96), profit=round1(sale-p.buyPrice);
  G.cash=round1(G.cash+sale);
  noteSale(p,sale); inductHOF(p,false);
  p.owned=false; p.starter=false; p.wage=0; p.contractYears=0; untrain(id);
  G.offers=(G.offers||[]).filter(o=>o.playerId!==id);
  G.squad.splice(i,1); G.market.unshift(p);
  toast(`卖出 ${p.name}：${eur(sale)}（${profit>=0?"盈利 +":"亏损 "}${eur(Math.abs(profit))}）`);
  pushNews(`💰 卖出 <b>${p.name}</b>：${eur(sale)}（${profit>=0?"盈利+":"亏损"}${eur(Math.abs(profit))}）。`,profit>=0?"good":"bad");
  save(); render();
}
// 续约要求的周薪：基础随评分，年限越长要求略高；状态好/闹转会要求更高
function renewAsk(p, years){
  let ask=wageDemand(p.ovr)*(1+(years-2)*0.04)*(1+(p.formIdx-2)*0.03);
  if(p.wantOut) ask*=1.18;                          // 闹转会的球员要价更硬
  if((p.morale==null?70:p.morale)<40) ask*=1.08;
  if(p.age>=31) ask*=0.92;                            // 老将议价空间小
  return round2(Math.max(0.01, ask));
}
function renew(id){ openRenew(id); }                  // 兼容旧入口
function openRenew(id){
  const p=G.squad.find(x=>x.id===id); if(!p) return;
  const base=wageDemand(p.ovr), initYears=Math.min((p.contractYears||1)+2,5);
  G._renew={id, years:initYears, wage:round2(renewAsk(p,initYears)), wMin:round2(base*0.5), wMax:round2(Math.max(base*2.0,renewAsk(p,5)*1.2))};
  const r=G._renew;
  showOverlay(`
    <h2 style="text-align:center">📝 续约 · ${NATIONS[p.nat].flag} ${p.name}</h2>
    <div class="hint" style="text-align:center;margin:-4px 0 8px">${p.pos} · 评分 ${p.ovr} · ${p.age}岁 · 当前周薪 ${eur(p.wage)} · 合同剩 ${p.contractYears} 年</div>
    <div class="negbox">
      <div class="l"><span>球员要求周薪</span><b id="rnAsk"></b></div>
      <div class="l"><span>态度</span><b id="rnMood"></b></div>
      <div class="l"><span>续约佣金</span><b id="rnFee"></b></div>
    </div>
    <div class="field"><label>合同年限：<b id="rnYearsL"></b></label>
      <input type="range" min="1" max="5" step="1" value="${r.years}" oninput="setRenew('years',this.value)"></div>
    <div class="field"><label>提供周薪：<b id="rnWageL"></b></label>
      <input type="range" min="${r.wMin}" max="${r.wMax}" step="0.01" value="${r.wage}" oninput="setRenew('wage',this.value)">
      <div class="hint" id="rnRatio"></div></div>
    <button class="btn big" style="width:100%;margin-top:6px" id="rnBtn" onclick="confirmRenew()"></button>
    <button class="btn ghost" style="width:100%;margin-top:8px" onclick="G._renew=null;closeOverlay()">取消</button>`, true);
  syncRenew();
}
function setRenew(k,v){ if(!G._renew) return; G._renew[k]=(k==="wage"?round2(+v):+v); syncRenew(); }
function syncRenew(){
  const r=G._renew; if(!r) return; const p=G.squad.find(x=>x.id===r.id); if(!p) return;
  const ask=renewAsk(p,r.years), ratio=r.wage/ask, fee=round1(Math.max(0.1,p.value*0.03));
  let mood, ok=false;
  if(ratio>=1.0){ mood='<span style="color:var(--up)">满意，乐意续约 🤝</span>'; ok=true; }
  else if(ratio>=0.88){ mood='<span style="color:var(--gold)">勉强可以接受</span>'; ok=true; }
  else if(ratio>=0.75){ mood='<span style="color:#e3c34a">嫌低，犹豫不决（可能拒绝）</span>'; ok=true; }
  else { mood='<span style="color:var(--down)">报价太低，拒绝谈判 🙅</span>'; ok=false; }
  const set=(id,html)=>{ const e=document.getElementById(id); if(e) e.innerHTML=html; };
  set("rnAsk",`${eur(ask)}/轮`); set("rnMood",mood); set("rnFee",eur(fee));
  set("rnYearsL",`${r.years} 年`); set("rnWageL",`${eur(r.wage)}/轮`);
  set("rnRatio",`要求 ${eur(ask)} · 你提供 ${Math.round(ratio*100)}%`);
  const btn=document.getElementById("rnBtn"); if(btn){ btn.disabled=!ok; btn.textContent= ok?`确认续约（佣金 ${eur(fee)}）`:'对方拒绝此报价'; }
}
function confirmRenew(){
  const r=G._renew; if(!r) return; const p=G.squad.find(x=>x.id===r.id); if(!p){ closeOverlay(); return; }
  const ask=renewAsk(p,r.years), ratio=r.wage/ask, fee=round1(Math.max(0.1,p.value*0.03));
  if(ratio<0.75){ toast(`${p.name} 拒绝了这份报价`); return; }
  if(ratio<0.88 && Math.random()<0.5){ toast(`${p.name} 觉得待遇太低，谈崩了`); pushNews(`🙅 <b>${p.name}</b> 拒绝了你的续约报价（嫌薪资偏低）。`,"bad"); return; }
  if(G.cash<fee){ toast("现金不足支付续约佣金"); return; }
  G.cash=round1(G.cash-fee);
  p.contractYears=r.years; p.wage=round2(r.wage); p.wantOut=false; p.morale=clamp((p.morale==null?70:p.morale)+8,0,100);
  G._renew=null; closeOverlay();
  toast(`${p.name} 续约成功（${r.years}年 · 周薪 ${eur(p.wage)}）`);
  pushNews(`✍️ <b>${p.name}</b> 与球队续约 ${r.years} 年，周薪 ${eur(p.wage)}/轮。`,"good");
  save(); render();
}
function acceptOffer(playerId){
  const oi=G.offers.findIndex(o=>o.playerId===playerId); if(oi<0) return;
  const o=G.offers[oi];
  const pi=G.squad.findIndex(p=>p.id===playerId); if(pi<0){ G.offers.splice(oi,1); render(); return; }
  if(G.squad.length<=11){ toast("阵容不能少于 11 人，无法出售"); return; }
  const p=G.squad[pi];
  const profit=round1(o.amount-p.buyPrice);
  G.cash=round1(G.cash+o.amount);
  noteSale(p,o.amount); inductHOF(p,false);
  const club=G.table.find(t=>t.name===o.fromClub);
  untrain(playerId);
  p.owned=false; p.starter=false; p.wage=0; p.contractYears=0;
  p.free=false;
  if(club&&club.squad){ club.squad.push(p); club.str=round1(clubStr(club)); } // 真实加入对手阵容
  G.squad.splice(pi,1); G.offers.splice(oi,1);
  toast(`接受 ${o.fromClub} 的报价，${p.name} 转会（${eur(o.amount)}）`);
  pushNews(`✅ 接受 <b>${o.fromClub}</b> 的报价，<b>${p.name}</b> 以 ${eur(o.amount)} 转会（${profit>=0?'盈利+':'亏损'}${eur(Math.abs(profit))}）。`,profit>=0?"good":"bad");
  save(); render();
}
function rejectOffer(playerId){
  const oi=G.offers.findIndex(o=>o.playerId===playerId); if(oi<0) return;
  const o=G.offers.splice(oi,1)[0];
  toast("已拒绝报价"); pushNews(`🚫 拒绝了 ${o.fromClub} 对 ${o.playerName} 的报价。`,"match");
  save(); render();
}
function toggleStarter(id){
  const p=G.squad.find(x=>x.id===id); if(!p) return;
  if(inLineup(id)){ removeFromLineup(id); save(); render(); return; }
  if(p.injured){ toast("伤病球员无法首发"); return; }
  const ss=slots();
  let idx=-1, best=-1;                                              // 放进熟练度最高的空位
  ss.forEach((s,i)=>{ if(G.lineup[i]==null){ const e=posEff(p,s.pos); if(e>best){ best=e; idx=i; } } });
  if(idx<0){ toast("首发已满 11 人，去球场拖动替换或先下场一人"); return; }
  placeInLineup(id, idx);
}

// ---------- 衍生 ----------
function networth(){ return round1(G.cash + G.squad.reduce((a,p)=>a+p.value,0)); }
function myRank(){ const s=divClubs(myDiv()).sort(cmpTable); return s.findIndex(t=>t.you)+1; }
function pushNews(html,type="match"){ G.news.unshift({w:`S${G.season}·R${Math.min(G.round,G.totalRounds)}`,html,type}); if(G.news.length>70) G.news.pop(); }
function addHonor(title, who){ if(!Array.isArray(G.honors)) G.honors=[]; G.honors.unshift({season:G.season, club:who||G.club, title}); }
// ---------- 队史纪录 / 名人堂 ----------
function ensureRecords(){ if(!G.records) G.records={topWin:null, recordSigning:null, recordSale:null, seasonScorers:[]}; if(!Array.isArray(G.hof)) G.hof=[]; }
function recordMatch(mg,og,opp){ ensureRecords(); if(mg>og){ const m=mg-og, tw=G.records.topWin; if(!tw || m>(tw.mg-tw.og) || (m===(tw.mg-tw.og)&&mg>tw.mg)) G.records.topWin={mg,og,opp,season:G.season,club:G.club}; } }
function noteSigning(p,fee){ ensureRecords(); if(!G.records.recordSigning || fee>G.records.recordSigning.fee) G.records.recordSigning={name:p.name, fee:round1(fee), season:G.season, club:G.club}; }
function noteSale(p,fee){ ensureRecords(); if(!G.records.recordSale || fee>G.records.recordSale.fee) G.records.recordSale={name:p.name, fee:round1(fee), season:G.season, club:G.club}; }
function recordSeasonScorer(){ ensureRecords(); const top=[...G.squad].filter(p=>p.gls).sort((a,b)=>b.gls-a.gls)[0]; if(top){ G.records.seasonScorers.unshift({season:G.season, name:top.name, gls:top.gls, ast:top.ast||0, club:G.club}); if(G.records.seasonScorers.length>40) G.records.seasonScorers.pop(); } }
function hofStats(p){ return {apps:(p.clubApps||0)+(p.apps||0), gls:(p.clubGls||0)+(p.gls||0), ast:(p.clubAst||0)+(p.ast||0)}; }
function hofQualify(p){ const s=hofStats(p); return s.apps>=30 || s.gls>=18 || s.ast>=20; }
function inductHOF(p, retired, clubName){
  ensureRecords(); if(p._hof || !hofQualify(p)) return;
  const club=clubName||G.club;
  const s=hofStats(p), seasons=clamp((G.season-(p.joinedSeason||G.season))+1,1,30);
  G.hof.unshift({name:p.name, nat:p.nat, pos:p.pos, traits:(p.traits||[]).slice(), apps:s.apps, gls:s.gls, ast:s.ast, seasons, retired:!!retired, season:G.season, club});
  p._hof=true;
  pushNews(`🏛️ <b>${p.name}</b> 入选 ${club} 名人堂！（${seasons}季 · ${s.apps}场 · ${s.gls}球 · ${s.ast}助${retired?' · 功成身退':''}）`,"good");
}
// 球员自主退役意愿：年龄越大越高；仍是主力/水平高 → 踢得更久；边缘老将 → 更早挂靴
function retireChance(p){
  const a=p.age; if(a<34) return 0;
  let base = a>=40?0.9 : a===39?0.72 : a===38?0.5 : a===37?0.3 : a===36?0.15 : a===35?0.07 : 0.03;
  const apps=p.apps||0;
  if(apps>=12) base*=0.5; else if(apps<=3) base*=1.45;
  if(p.ovr>=80) base*=0.6; else if(p.ovr<60) base*=1.25;
  return clamp(base,0,0.95);
}
function retirePlayer(p){
  const i=G.squad.findIndex(x=>x.id===p.id); if(i<0) return;
  inductHOF(p, true);
  G.squad.splice(i,1);
  if(Array.isArray(G.lineup)) G.lineup=G.lineup.map(id=>id===p.id?null:id);
  untrain(p.id);
  pushNews(`👴 <b>${p.name}</b>（${p.age}岁）宣布退役，结束在 ${G.club} 的职业生涯。`,"match");
}
function viewHonors(){
  const h=G.honors||[];
  const counts={}; h.forEach(e=>counts[e.title]=(counts[e.title]||0)+1);
  const summary=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]).map(t=>`<div class="l"><span>${t}</span><b style="color:var(--gold)">${counts[t]} 次</b></div>`).join("")||'<div class="hint">还没有冠军——带队夺冠后会记录在此。</div>';
  const list=[...h].sort((a,b)=>b.season-a.season).map(e=>`<div class="l"><span>S${e.season} · ${e.club}</span><b style="color:var(--gold)">🏆 ${e.title}</b></div>`).join("")||'<div class="hint">暂无夺冠记录</div>';
  ensureRecords();
  const rec=G.records, recRow=(label,val)=>`<div class="l"><span>${label}</span><b>${val}</b></div>`;
  const recHTML=
    recRow("🏟️ 最大比分胜利", rec.topWin?`${rec.topWin.mg}-${rec.topWin.og} vs ${rec.topWin.opp}（S${rec.topWin.season}）`:"—")+
    recRow("💸 队史标王（最贵引进）", rec.recordSigning?`${rec.recordSigning.name} · ${eur(rec.recordSigning.fee)}（S${rec.recordSigning.season}）`:"—")+
    recRow("💰 最贵卖出", rec.recordSale?`${rec.recordSale.name} · ${eur(rec.recordSale.fee)}（S${rec.recordSale.season}）`:"—");
  const scorers=(rec.seasonScorers||[]).slice(0,12).map(s=>`<div class="l"><span>S${s.season} · ${s.name}</span><b>${s.gls} 球${s.ast?` · ${s.ast} 助`:''}</b></div>`).join("")||'<div class="hint">赛季结束后记录当季最佳射手</div>';
  const hof=(G.hof||[]);
  const hofHTML=hof.length? hof.map(e=>`<div class="negbox"><div class="l"><span><b>${NATIONS[e.nat]?NATIONS[e.nat].flag:""} ${e.name}</b> <span class="pos ${POS_LINE[e.pos]||''}" style="font-size:11px">${e.pos}</span> ${(e.traits||[]).map(t=>TRAITS[t]?TRAITS[t].icon:'').join('')}</span><span class="hint">${e.retired?'退役':'传奇'} · S${e.season}</span></div><div class="hint" style="margin-top:3px">${e.club} · ${e.seasons}季 · ${e.apps}场 · ⚽${e.gls} · 🅰️${e.ast}</div></div>`).join("") : '<div class="hint">为球队效力 30+ 场 / 18+ 球 / 20+ 助 的球员，在退役或离队时入选名人堂。</div>';
  return `<div class="panel"><h2>🏅 经理生涯荣誉 <span class="hint">（共 ${h.length} 座冠军）</span></h2>
    <div class="negbox">${summary}</div></div>
  <div class="panel"><h2>📜 夺冠记录（赛季 · 球队 · 奖项）</h2><div class="negbox">${list}</div></div>
  <div class="panel"><h2>📊 队史纪录 <span class="hint">（${G.club}）</span></h2><div class="negbox">${recHTML}</div></div>
  <div class="panel"><h2>⚽ 历届最佳射手</h2><div class="negbox">${scorers}</div></div>
  <div class="panel"><h2>🏛️ 名人堂 <span class="hint">（${hof.length} 人）</span></h2>${hofHTML}</div>`;
}

function starsStr(n){ let s=""; for(let i=1;i<=5;i++) s+=i<=n?"★":"☆"; return s; }
function potStars(v){ return clamp(Math.round((v-50)/9),1,5); }
function fmtChg(p){
  const d=p.value-p.buyPrice;
  if(!p.owned||Math.abs(d)<0.05) return `<span class="chg flat">—</span>`;
  const pct=p.buyPrice>0?Math.round(d/p.buyPrice*100):0;
  return `<span class="chg ${d>0?"up":"down"}">${d>0?"▲":"▼"} ${eur(Math.abs(d))} (${pct>0?"+":""}${pct}%)</span>`;
}
function formPill(p){ const f=FORMS[p.formIdx]; return `<span class="form-pill" style="background:${f.color}22;color:${f.color}">${f.name}</span>`; }
function potBadge(p){
  if(p.scouted) return `<span class="pot known">潜${p.potential} <span class="stars">${starsStr(potStars(p.potential))}</span></span>`;
  return `<span class="pot unknown">潜~${p.potEst}? <span class="stars">${starsStr(potStars(p.potEst))}</span></span>`;
}
function playerCard(p,mode){
  const inj=p.injured?`<span class="chg down">🤕${p.injured}轮</span>`:"";
  const star=(mode==="squad"&&p.starter)?"starter":"";
  const injc=p.injured?"injured":"";
  const wonder=(isWonder(p)&&p.scouted)?"wonder":"";
  const wt=(isWonder(p)&&p.scouted)?`<span class="wonder-tag">妖人</span>`:"";
  let extra="", actions="";
  if(mode==="squad"){
    const ctr = p.contractYears<=1?`<span class="ctr-tag warn">合同最后1年</span>`:`<span class="ctr-tag">合同${p.contractYears}年</span>`;
    const tt = G.training.includes(p.id)?`<span class="ctr-tag" style="background:#1f3a2a;color:var(--up)">🎓训练中</span>`:"";
    extra=`<div class="meta">买入 ${eur(p.buyPrice)} ${fmtChg(p)} · 周薪 ${eur(p.wage)} ${ctr} ${tt}</div>`;
    actions=`<div class="actions">
      <button class="btn sm ${p.starter?'':'ghost'}" onclick="toggleStarter(${p.id})">${p.starter?"✓首发":"替补"}</button>
      <button class="btn sm ghost" onclick="openRenew(${p.id})">${p.contractYears<=1?'⚠️ 续约':'续约'}</button>
      <button class="btn sm ghost" onclick="loanOut(${p.id})">租借</button>
      <button class="btn sm sell" onclick="sell(${p.id})">卖 ${eur(round1(p.value*0.96))}</button>
    </div>`;
  } else {
    const scoutBtn=p.scouted?"":`<button class="btn sm scout" onclick="sendScout(${p.id})">🔭考察</button>`;
    actions=`<div class="actions">
      <button class="btn sm" onclick="openNegotiation(${p.id})">💬 谈判</button>
      ${scoutBtn}
    </div>`;
  }
  return `<div class="pcard ${star} ${injc} ${wonder}">
    <div class="prow">
      <span class="pos ${POS_LINE[p.pos]}" title="${POS_CN[p.pos]||''}">${p.pos}</span>
      <span class="pname clk" onclick="openPlayer(${p.id})">${NATIONS[p.nat].flag} ${p.name} ${traitBadges(p)}</span>
      <span class="ovr">${p.ovr}</span>
    </div>
    <div class="meta">
      <span>${p.age}岁</span>${formPill(p)} ${potBadge(p)} ${mode==="squad"?moraleEmoji(p):''} ${(mode==="squad"&&p.wantOut)?'<span class="ctr-tag" style="background:#3a2030;color:#ff9bb0">要求转会</span>':''} ${(p.pos2&&p.pos2.length)?`<span class="ctr-tag" style="background:#23304a;color:#9fb6d8">兼 ${p.pos2.join('/')}</span>`:''} ${wt} ${inj} ${(p.free&&!p.owned)?'<span class="ctr-tag" style="background:#13324a;color:#7fd0ff">🆓自由身</span>':''}
      <span class="spacer" style="flex:1"></span>
      <span class="val">${eur(p.value)}</span>
    </div>
    ${extra}
    ${actions}
  </div>`;
}

function lastName(n){ const a=n.split(" "); return a[a.length-1]; }
function pitchSlotHTML(s,i){
  const id=G.lineup[i];
  const p=(id!=null)&&G.squad.find(x=>x.id===id);
  if(p){
    const ef=posEff(p,s.pos); const oop=ef<1;
    const effTxt = ef>=0.999?"本职" : `${POS_CN[s.pos]} 熟练度 ${Math.round(ef*100)}%`;
    return `<div class="slot ${oop?'oop':''}" style="left:${s.x}%;top:${s.y}%" draggable="true"
      ondragstart="dragData={from:'slot',slot:${i},id:${p.id}}" ondragover="event.preventDefault()" ondrop="dropOnSlot(${i})"
      onclick="clickSlot(${i})" title="${p.name}（本职 ${POS_CN[p.pos]}${p.pos2&&p.pos2.length?' / 兼 '+p.pos2.map(x=>POS_CN[x]).join('、'):''}｜该位置：${effTxt}）">
      <div class="disc ${POS_LINE[p.pos]}">${p.ovr}</div><div class="nm">${s.pos}·${lastName(p.name)}</div></div>`;
  }
  return `<div class="slot empty ${G._sel!=null?'avail':''}" style="left:${s.x}%;top:${s.y}%"
    ondragover="event.preventDefault()" ondrop="dropOnSlot(${i})" onclick="clickSlot(${i})">

}

    <div class="pitch" ondragover="event.preventDefault()">${ss.map((s,i)=>pitchSlotHTML(s,i)).join("")}</div>
    <div class="hint" style="margin-top:8px">替补席（拖到球场上场 / 把场上球员拖到此处下场）</div>
    <div class="bench" ondragover="event.preventDefault()" ondrop="dropOnBench()">${bench}</div>

function setMarketSort(k){ if((G.marketSort||'ovr')===k) G.marketSortDir=(G.marketSortDir||-1)*-1; else { G.marketSort=k; G.marketSortDir=(k==='age')?1:-1; } save(); render(); }
function marketList(){
  let list=G.market.map(p=>({p,club:null}));
  rivalClubs().forEach(c=>{ if(c.squad) c.squad.forEach(p=>list.push({p,club:c})); });
  if(G.marketFilterPos!=="ALL") list=list.filter(e=>POS_LINE[e.p.pos]===G.marketFilterPos);
  if(G.marketFreeOnly) list=list.filter(e=>!e.club && e.p.free);
  const raw=(G.marketFilterText||"").trim(), t=raw.toLowerCase();
  if(t) list=list.filter(e=>e.p.name.toLowerCase().includes(t) || (e.p.nat&&e.p.nat.includes(raw)));
  const sf=G.marketSort||'ovr', sd=G.marketSortDir||-1;
  const sv=e=>{ const p=e.p; return sf==='value'?p.value : sf==='age'?p.age : sf==='potential'?(p.scouted?p.potential:p.potEst) : p.ovr; };
  list.sort((a,b)=>(sv(a)-sv(b))*sd);
  if(!list.length) return `<div class="empty">没有符合条件的球员</div>`;
  const capped=list.slice(0,60);
  return capped.map(e=> e.club? worldPlayerCard(e.p,e.club) : playerCard(e.p,"market")).join("")
    + (list.length>60?`<div class="hint" style="grid-column:1/-1">仅显示前 60 名，输入球员姓名或国家（如「中国」「巴西」）缩小范围</div>`:"");
}

  return `<div class="pcard ${isWonder(p)?'wonder':''} ${p.injured?'injured':''}">

      <span class="pos ${POS_LINE[p.pos]}" title="${POS_CN[p.pos]||''}">${p.pos}</span>

function generateIntake(){
  if(!G.academy) G.academy={level:1, prospects:[]};
  const lvl=G.academy.level, n=lvl+1;
  for(let i=0;i<n;i++){
    const ovr=rint(44, 52+lvl*2);
    const p=makePlayer(pick(POS),{ovr, age:rint(15,17), potBoost:rint(8, 12+lvl*4), nat:(G.academy.targetNat||undefined)});
    p.homegrown=true;
    G.academy.prospects.push(p);

}

function recallLoan(id){
