// ---------- 赞助（多类型槽位 + 绩效奖金） ----------
const SPONSOR_NAMES=["远东航空","北辰银行","蓝鲸保险","云图科技","赤岭能源","海格汽车","星汉手机","绿源饮料","金沙地产","环宇物流","昆仑石油","天枢传媒"];
const SPONSOR_SUFFIX=["","控股","集团","国际"];
const SPONSOR_TYPES={
  main:   {name:"胸前主赞助", icon:"👕", mult:1.0},
  kit:    {name:"球衣供应商", icon:"🥾", mult:0.7},
  back:   {name:"背部赞助",   icon:"🔢", mult:0.5},
  sleeve: {name:"袖标赞助",   icon:"🎽", mult:0.4},
  naming: {name:"球场冠名",   icon:"🏟️", mult:0.75},
};
const SPONSOR_TKEYS=["main","kit","back","sleeve","naming"];
const SPONSOR_BONUS_CN={league:"联赛夺冠",conti:"进入洲际赛",cup:"国内杯夺冠"};
const PARTNER_MAX=6;
function brandValue(){   // 品牌价值/全球人气：随声望、球星、荣誉、联赛级别上涨，放大所有赞助与商业收入
  const rep=G.rep||50;
  const stars=[...(G.squad||[])].sort((a,b)=>b.ovr-a.ovr).slice(0,5).reduce((a,p)=>a+Math.max(0,p.ovr-72),0);
  const trophies=(G.honors||[]).length;
  return clamp(Math.round(rep*0.55 + stars*1.4 + trophies*1.6 + (myDiv()===0?12:0)), 10, 100);
}
function brandMult(){ return 0.6 + brandValue()/100*0.85; }   // 品牌系数 0.6~1.45
function ensureSponsorSlots(){
  if(!G.sponsorSlots||typeof G.sponsorSlots!=="object"){ G.sponsorSlots={}; if(Array.isArray(G.sponsors)) G.sponsors.forEach((s,i)=>{ const t=SPONSOR_TKEYS[i]; if(t&&s) G.sponsorSlots[t]={brand:s.name,per:s.per,seasonsLeft:s.seasonsLeft,bonus:{}}; }); }
  SPONSOR_TKEYS.forEach(t=>{ if(!(t in G.sponsorSlots)) G.sponsorSlots[t]=null; });
  if(!Array.isArray(G.partners)) G.partners=[];
  if(!Array.isArray(G.partnerOffers)) G.partnerOffers=[];
}
function sponsorBasePer(type){
  const rep=G.rep||50, div0=(myDiv()===0);
  let base=(0.16 + rep/100*0.4 + (div0?0.2:0)) * SPONSOR_TYPES[type].mult * brandMult();
  if(type==="naming" && G.stadium) base*=clamp(G.stadium.capacity/30000, 0.6, 2.2);   // 冠名价值随球场规模
  return base;
}
function genSponsorOffers(){
  ensureSponsorSlots(); G.sponsorOffers=[];
  SPONSOR_TKEYS.forEach(t=>{
    if(G.sponsorSlots[t]) return;                        // 该槽位已有赞助
    const k=Math.random()<0.6?2:1;                       // 每个空槽给 1~2 个报价
    for(let n=0;n<k;n++){
      const per=round2(sponsorBasePer(t)*rnd(0.85,1.25));
      const scale=per/Math.max(0.01,sponsorBasePer(t)); const bonus={};
      shuffle([["league",rnd(6,14)],["conti",rnd(3,8)],["cup",rnd(3,7)]]).slice(0, Math.random()<0.5?2:1).forEach(c=>bonus[c[0]]=round1(c[1]*scale));
      G.sponsorOffers.push({type:t, name:pick(SPONSOR_NAMES)+pick(SPONSOR_SUFFIX), per, signOn:round1(per*rnd(4,7)), seasons:rint(2,4), bonus});
    }
  });
  // 官方合作伙伴：可叠加（最多 PARTNER_MAX 个），每季多个小额报价
  G.partnerOffers=[];
  for(let n=0,pn=rint(3,5);n<pn;n++){ const per=round2((0.05+(G.rep||50)/100*0.11)*brandMult()*rnd(0.8,1.3)); G.partnerOffers.push({name:pick(SPONSOR_NAMES)+pick(SPONSOR_SUFFIX), per, signOn:round1(per*rnd(3,5)), seasons:rint(1,3)}); }
}
function signSponsor(idx){
  ensureSponsorSlots(); const o=G.sponsorOffers[idx]; if(!o||!SPONSOR_TYPES[o.type]) return;
  if(G.sponsorSlots[o.type]){ toast(`${SPONSOR_TYPES[o.type].name} 已被占用`); return; }
  G.cash=round1(G.cash+o.signOn);
  G.sponsorSlots[o.type]={brand:o.name, per:o.per, seasonsLeft:o.seasons, bonus:o.bonus||{}};
  G.sponsorOffers=G.sponsorOffers.filter(x=>x.type!==o.type);   // 同类型其它报价作废
  toast(`签约 ${SPONSOR_TYPES[o.type].name}：${o.name}`);
  const bz=Object.keys(o.bonus||{}).map(k=>`${SPONSOR_BONUS_CN[k]} +${eur(o.bonus[k])}`).join("、");
  pushNews(`💼 签约${SPONSOR_TYPES[o.type].name} <b>${o.name}</b>：签约金 ${eur(o.signOn)}，每轮 +${eur(o.per)}${bz?`；绩效：${bz}`:''}。`,"good");
  save(); render();
}
function signPartner(idx){
  ensureSponsorSlots(); const o=G.partnerOffers[idx]; if(!o) return;
  if(G.partners.length>=PARTNER_MAX){ toast(`官方合作伙伴已满（${PARTNER_MAX} 个）`); return; }
  G.cash=round1(G.cash+o.signOn);
  G.partners.push({name:o.name, per:o.per, seasonsLeft:o.seasons});
  G.partnerOffers.splice(idx,1);
  toast(`签约官方合作伙伴：${o.name}`);
  pushNews(`🤝 签约官方合作伙伴 <b>${o.name}</b>：签约金 ${eur(o.signOn)}，每轮 +${eur(o.per)}。`,"good");
  save(); render();
}
function sponsorIncome(){ ensureSponsorSlots(); const ex=SPONSOR_TKEYS.reduce((a,t)=>a+(G.sponsorSlots[t]?G.sponsorSlots[t].per:0),0); const pa=(G.partners||[]).reduce((a,s)=>a+s.per,0); return round2(ex+pa); }
function paySponsorBonuses(ach){   // 赛季末按达成情况发放赞助绩效奖金
  ensureSponsorSlots(); let total=0; const hits=[];
  SPONSOR_TKEYS.forEach(t=>{ const s=G.sponsorSlots[t]; if(!s||!s.bonus) return; ["league","conti","cup"].forEach(k=>{ if(ach[k] && s.bonus[k]){ total+=s.bonus[k]; hits.push(`${s.brand}·${SPONSOR_BONUS_CN[k]} +${eur(s.bonus[k])}`); } }); });
  if(total>0){ G.cash=round1(G.cash+total); pushNews(`💼 赞助绩效奖金到账 +${eur(round1(total))}（${hits.join("、")}）。`,"good"); }
}
// ---------- 球场 / 设施经营 ----------
function stadiumCap(s){ return clamp(Math.round((7000+(s-48)*1000)/500)*500, 6000, 60000); }
function fairTicket(){ return Math.round(18 + Math.max(0,(teamRatings().ovr-52))*1.1); }   // 球队越强，合理票价越高
function attendanceRate(oppStr){
  const rk=myRank();
  let base=0.64 + (rk<=3?0.18: rk<=G.goalRank?0.08: rk>=9?-0.12:0);            // 排名
  base += (G.board>=70?0.06: G.board<=30?-0.08:0);                             // 董事会信心(球迷情绪)
  base += clamp(((oppStr||70)-70)/200,0,0.12);                                 // 强敌/大战吸引
  const fair=fairTicket();
  base -= clamp((((G.stadium&&G.stadium.ticketPrice)||fair)-fair)/fair*0.5, -0.15, 0.45); // 票价越高上座越低
  return clamp(base,0.3,1.0);
}
function expandCost(){ const c=(G.stadium&&G.stadium.capacity)||10000; return round1(6 + c/5000*2.5); }
function expandStadium(){
  if(!G.stadium) return; if(G.stadium.capacity>=85000){ toast("球场已达最大容量"); return; }
  const cost=expandCost(); if(G.cash<cost){ toast("现金不足扩建球场"); return; }
  G.cash=round1(G.cash-cost); G.stadium.capacity=Math.min(85000,G.stadium.capacity+5000);
  toast(`球场扩建至 ${G.stadium.capacity.toLocaleString()} 座`);
  pushNews(`🏟️ 球场扩建完成，容量提升至 <b>${G.stadium.capacity.toLocaleString()}</b> 座（耗资 ${eur(cost)}）。`,"good");
  save(); render();
}
function setTicketPrice(v){ if(!G.stadium) return; G.stadium.ticketPrice=clamp(Math.round(+v),10,100);
  const est=Math.round(G.stadium.capacity*attendanceRate(75)); const inc=round1(est*G.stadium.ticketPrice/1e6);
  const lab=document.getElementById("tpLab"); if(lab) lab.innerHTML=`票价 €${G.stadium.ticketPrice} · 预计上座 ${est.toLocaleString()} 人 · 约 ${eur(inc)}/主场`;
}
function commitTicketPrice(v){ setTicketPrice(v); save(); render(); }
const FACIL={ medical:{name:"医疗中心",icon:"➕",desc:"进一步降低全队伤病、加快康复（叠加队医）"}, commercial:{name:"商业开发",icon:"🛍️",desc:"球迷商店/周边，每轮带来额外商业收入"} };
function facilCost(level){ return [8,16,28,44][level]; }   // 0→1,1→2,2→3,3→4
function upgradeFacil(key){
  if(!G.facil) G.facil={medical:0,commercial:0}; const lv=G.facil[key]||0;
  if(lv>=4){ toast("该设施已满级"); return; }
  const cost=facilCost(lv); if(G.cash<cost){ toast("现金不足升级设施"); return; }
  G.cash=round1(G.cash-cost); G.facil[key]=lv+1;
  pushNews(`🏗️ ${FACIL[key].name} 升级至 Lv.${G.facil[key]}（耗资 ${eur(cost)}）。`,"good");
  save(); render();
}
function commercialIncome(){ return round2((G.facil&&G.facil.commercial?G.facil.commercial:0)*0.4); } // €M/轮
// ---------- 财务 / 银行贷款 ----------
function estSeasonGate(){ if(!G.stadium) return 0; const homeGames=Math.floor((G.totalRounds||22)/2); const rate=attendanceRate(75); return round1(homeGames*G.stadium.capacity*rate*G.stadium.ticketPrice/1e6); }
function annualRevenue(){ const perRound=sponsorIncome()+commercialIncome(); return round1(perRound*(G.totalRounds||22) + estSeasonGate() + 8); }   // 粗略年收入
function outstandingDebt(){ return round1((G.debts||[]).reduce((a,d)=>a+d.remaining,0)); }
function debtPerSeason(){ return round1((G.debts||[]).reduce((a,d)=>a+d.perSeason,0)); }
function creditLimit(){ return round1(Math.max(0, annualRevenue()*1.3*(0.55+(G.board==null?60:G.board)/100*0.55) - outstandingDebt())); }   // 授信额度随营收/董事会信心
function loanRate(){ return clamp(0.2 - (G.rep||50)/100*0.08 - (G.board==null?60:G.board)/100*0.06, 0.06, 0.2); }   // 总利率：信誉/信心越好越低
function finSummary(){
  const perRoundIn=sponsorIncome()+commercialIncome();
  const incEst=round1(perRoundIn*(G.totalRounds||22) + estSeasonGate() + 12);   // +赛季奖金粗估
  const perRoundOut=wageBill()+loanWageBill()+staffWageBill();
  const expEst=round1(perRoundOut*(G.totalRounds||22) + debtPerSeason());
  return {incEst, expEst, net:round1(incEst-expEst)};
}
function takeLoan(amount, term){
  amount=round1(amount); if(amount<=0) return;
  if(amount>creditLimit()){ toast("超过授信额度"); return; }

// 逐场动态成长：每场比赛后，参赛球员小幅向潜力成长 / 老将衰退（评分、身价即时变化）
function matchGrowth(players){
  if(!players) return;
  players.forEach(p=>{
    const gap=p.potential-p.ovr;
    const inT=p.owned && G.training && G.training.includes(p.id);
    const coachB = p.owned ? (staffLevel(lineCoachKey(POS_LINE[p.pos]))*0.012 + staffLevel("head")*0.008) : 0; // 专项+主教练成长加成
    const prod = hasTrait(p,"prodigy")?0.03:0;   // 天才成长更快
    let ch=0, dec=false;
    if(p.age<=23 && gap>0) ch=clamp(0.04+gap*0.008+(inT?0.04:0)+(p.age<=19?0.03:0)+coachB+prod,0.03,0.4);
    else if(p.age<=27 && gap>0) ch=0.03+(inT?0.03:0)+coachB+prod;
    else if(p.age>=30){ ch=inT?0.02:0.05; dec=true; if(p.owned) ch=clamp(ch - staffLevel("head")*0.006 - staffLevel(lineCoachKey(POS_LINE[p.pos]))*0.004,0.01,0.06); } // 教练抑制衰退
    if(ch>0 && Math.random()<ch){
      p.ovr=clamp(p.ovr+(dec?-1:1),40,99);
      p.value=round1(fairValue(p.ovr,p.age)*FORMS[p.formIdx].mult);
    }
  });
}

  }
}

function playInternational(){
  if(!G.national.nation){ toast("请先选择并任命一支国家队"); return; }
  if(G.national.played>=1){ toast("本赛季国际赛事已进行，下赛季再来"); return; }
  const my=G.national.nation, myStr=ntStrength(my);
  const others=NAT_KEYS.filter(k=>k!==my).sort(()=>Math.random()-0.5).slice(0,3);
  const win=(a,b)=>{ const ag=samplePoisson(clamp((a-b)/9+1.4,0.2,5)), bg=samplePoisson(clamp((b-a)/9+1.4,0.2,5)); return ag>=bg; };
  let result, repGain, cashGain;
  if(!win(myStr+rnd(-2,2), ntStrength(others[0])+rnd(-2,2))){ result="半决赛出局"; repGain=2; cashGain=4; }
  else {
    const fo=ntStrength(others[1])>=ntStrength(others[2])?others[1]:others[2];
    if(win(myStr+rnd(-2,2), ntStrength(fo)+rnd(-2,2))){ result="夺冠 🏆"; repGain=10; cashGain=18; G.national.titles=(G.national.titles||0)+1; }
    else { result="亚军 🥈"; repGain=5; cashGain=10; }
  }
  G.rep=clamp((G.rep||50)+repGain,0,100); G.cash=round1(G.cash+cashGain); G.national.played=1;
  allPlayers().filter(p=>p.nat===my).forEach(p=>{ p.formIdx=clamp(p.formIdx+1,0,4); });
  toast(`国家队赛事：${result}（声望+${repGain}，奖金 ${eur(cashGain)}）`);
  pushNews(`🌐 ${NATIONS[my].flag}${my}国家队国际赛事：<b>${result}</b>，声望 +${repGain}，奖金 +${eur(cashGain)}。`,"good");
  save(); render();
}

function celebrate(o){
  const old=document.getElementById("celebrate"); if(old) old.remove();
  const colors=["#d4af37","#5ad1ff","#ff6b6b","#7CFC00","#ff9f43","#b388ff","#ffffff","#ffd86b"];
  let conf="";
  for(let i=0;i<42;i++){ const l=Math.round(Math.random()*100); const c=colors[i%colors.length]; const dl=(Math.random()*0.8).toFixed(2); const dur=(1.8+Math.random()*1.8).toFixed(2); const rot=Math.round(Math.random()*360);
    conf+=`<span class="confetti" style="left:${l}%;background:${c};animation-duration:${dur}s;animation-delay:${dl}s;transform:rotate(${rot}deg)"></span>`; }
  const el=document.createElement("div"); el.className="celebrate"; el.id="celebrate";

function sparkline(arr,cur){
  const a=(arr||[]).slice(-30); if(cur!=null) a.push(cur);
  if(a.length<2) return '<span class="hint">数据积累中…（赛季推进后显示）</span>';
  const w=260,h=46,pad=4; const mn=Math.min(...a),mx=Math.max(...a); const rng=(mx-mn)||1;
  const xy=a.map((v,i)=>`${(pad+i*(w-2*pad)/(a.length-1)).toFixed(1)},${(pad+(h-2*pad)*(1-(v-mn)/rng)).toFixed(1)}`);
  const up=a[a.length-1]>=a[0]; const col=up?'#36d399':'#f87272';
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="46" preserveAspectRatio="none" style="display:block"><polyline points="${xy.join(' ')}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round"/></svg>`;

// ======================= 比赛直播 + 临场指挥 =======================
// 通用引擎：各类比赛(联赛/杯赛/洲际/世俱/国家队)统一通过 startMatch(cfg) 进入。
// cfg: { comp, oppName, getXG():{mxg,oxg}, knockout, oppStr, myStr(), allowSub, allowTactic, ntTactic, onFinish(mg,og,win) }
let LIVE=null;
const LV_MISS=["射门偏出！","门将奋力扑出！","横梁拒绝了进球！","越位在先，进球无效","头球攻门高出","角球开出无功而返","禁区混战化解","远射被没收"];
function startMatch(cfg){
  if(G.liveMatch===false){ const x=cfg.getXG(); concludeMatchInstant(cfg, samplePoisson(x.mxg), samplePoisson(x.oxg)); }
  else liveMatch(cfg);
}
function concludeMatchInstant(cfg, mg, og){
  let win=mg>og;
  if(cfg.knockout && mg===og){ const me=cfg.myStr?cfg.myStr():70, op=cfg.oppStr||70; win=Math.random()<clamp(0.5+(me-op)/40,0.2,0.8); }
  cfg.onFinish(mg, og, win);
}
function pickScorer(){
  const sq=starters(); if(!sq.length) return "球员";
  const wt=p=>{const L=POS_LINE[p.pos]; let w=L==="FW"?5:L==="MF"?3:L==="DF"?1:0.2; if(hasTrait(p,"poacher"))w*=2.5; if(hasTrait(p,"aerial"))w*=1.4; if(hasTrait(p,"setpiece"))w*=1.3; if(hasTrait(p,"winger"))w*=1.2; return w;};
  let tot=sq.reduce((a,p)=>a+wt(p),0), r=Math.random()*tot;
  for(const p of sq){ r-=wt(p); if(r<=0) return lastName(p.name); }
  return lastName(sq[0].name);
}
function liveMatch(cfg){
  LIVE={cfg, min:0, mg:0, og:0, feed:[], subs:0, maxSubs:5, myRed:0, oppRed:0, half:false, ended:false, speed:2, playing:false, ticker:null, menu:null, out:null, injured:null, willInjure:[], win:false, tiredWarned:new Set()};
  if(cfg.allowSub) starters().forEach(p=>p.stam=100);   // 本场体能满格
  let el=document.getElementById("live"); if(el) el.remove();
  el=document.createElement("div"); el.className="live"; el.id="live";
  el.innerHTML=`<div class="lv-top" id="lvTop"></div><div class="lv-bar" id="lvBar"></div><div class="lv-feed" id="lvFeed"></div><div class="lv-ctrl" id="lvCtrl"></div>`;
  document.body.appendChild(el);
  if(cfg.derby) pushFeed(0,`🔥 德比大战！${cfg.oppName} 来访，全场座无虚席，气氛火爆！`,"big");
  pushFeed(0,`🟢 开球！${cfg.homeName||G.club} vs ${cfg.oppName}`,"big");
  paintLiveAll(); liveResume();
}
function pushFeed(m,txt,cls){ if(!LIVE) return; LIVE.feed.push({m,txt,cls:cls||""}); if(LIVE.feed.length>60) LIVE.feed.shift(); }
function liveResume(){ if(!LIVE||LIVE.ended) return; LIVE.menu=null; LIVE.playing=true; paintLiveCtrl(); paintLiveTop(); scheduleStep(); }
function liveTogglePause(){ if(!LIVE) return; if(LIVE.playing){ livePause(); paintLiveCtrl(); } else liveResume(); }
function livePause(){ if(!LIVE) return; LIVE.playing=false; if(LIVE.ticker){ clearTimeout(LIVE.ticker); LIVE.ticker=null; } }
function scheduleStep(){ if(!LIVE||!LIVE.playing) return; const d=LIVE.speed>=3?55:LIVE.speed===2?120:230; LIVE.ticker=setTimeout(liveStep,d); }
function liveStep(){
  if(!LIVE||!LIVE.playing||LIVE.ended) return;
  LIVE.min++; simMinute();
  if(G.autoSub!==false && !LIVE.injured && (LIVE.min===62||LIVE.min===74||LIVE.min===84)){ if(autoSub(1)>0) paintLiveCtrl(); }  // 助教自动调整
  if(LIVE.injured){ livePause(); LIVE.menu="injury"; paintLiveTop(); paintLiveFeed(); paintLiveCtrl(); return; }
  if(LIVE.min>=45 && !LIVE.half){ LIVE.half=true; livePause(); pushFeed(45,`⏸ 中场休息 — 比分 ${LIVE.mg}-${LIVE.og}`,"big"); LIVE.menu="half"; paintLiveTop(); paintLiveFeed(); paintLiveCtrl(); return; }
  if(LIVE.min>=90){ liveEnd(); return; }
  paintLiveTop(); paintLiveFeed(); scheduleStep();
}
function simMinute(){
  const hn=LIVE.cfg.homeName||G.club;
  // 体能：场上球员逐分钟掉体能（年龄大掉更快，铁人更慢）；只有俱乐部比赛(allowSub)用你的真实阵容
  let sf=1;
  if(LIVE.cfg.allowSub){
    const on=starters();

function autoSub(limit){

    if(!tired.length) break;
    const out=tired[0];
    const bench=G.squad.filter(p=>!p.starter && !p.injured && !p._subOff);
    let cand=bench.filter(p=>POS_LINE[p.pos]===POS_LINE[out.pos]).sort((a,b)=>b.ovr-a.ovr)[0] || bench.sort((a,b)=>b.ovr-a.ovr)[0];
    if(!cand) break;

    document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1500);
    toast("已导出存档文件，去下载文件夹找它");
  }catch(e){ toast("导出失败，试试复制存档码"); }
}
function importSaveClick(){
  const inp=document.createElement("input"); inp.type="file"; inp.accept=".json,application/json,text/plain";
  inp.onchange=e=>{ const f=e.target.files&&e.target.files[0]; if(!f) return; const rd=new FileReader(); rd.onload=()=>importSaveText(rd.result); rd.readAsText(f); };
  inp.click();
}
function importPrompt(prefill){
  showOverlay(`<h2>📥 导入存档</h2><p style="color:var(--dim)">把存档码粘贴到下面，点「导入」。也可用「📂 导入存档(文件)」选 .json 文件。</p>
    <textarea id="impTxt" style="width:100%;height:150px;background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px;font-size:11px" placeholder="在此粘贴存档码…">${typeof prefill==="string"?prefill:""}</textarea>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn big" style="flex:1" onclick="importSaveText(document.getElementById('impTxt').value)">导入并继续</button>
      <button class="btn ghost" style="flex:1" onclick="closeOverlay()">关闭</button>
    </div>`);
}
function importSaveText(str){
  try{ const obj=JSON.parse(str); if(!obj||!obj.squad||!obj.table){ toast("存档无效或不完整"); return; }
    localStorage.setItem(SAVE_KEY, typeof str==="string"?str:JSON.stringify(obj));
    if(load()){ closeOverlay(); G.tab="squad"; render(); toast("✅ 存档导入成功，已切换到该存档！"); }
    else toast("导入失败：存档结构无法读取");
  }catch(e){ toast("存档格式错误，无法解析"); }
}
function budgetDifficulty(b){ return b<30?"硬核":b<80?"标准":b<160?"充裕":"巨富"; }
let setupWorld=null;
function confirmNewGame(){ setupCfg={conf:null, country:null, clubIdx:null, budget:65}; setupWorld=buildWorld(); renderSetup(); }
function setConf(c){ setupCfg.conf=c; setupCfg.country=null; setupCfg.clubIdx=null; renderSetup(); }
function setCountry(ct){ setupCfg.country=ct; setupCfg.clubIdx=null; renderSetup(); }
function setClub(i){ setupCfg.clubIdx=i; renderSetup(); }
function renderSetup(){
  const confs=Object.keys(CONTI);
  const confChips=confs.map(c=>`<span class="chip ${setupCfg.conf===c?'active':''}" onclick="setConf('${c}')">${c}</span>`).join("");
  let countryBlock="", clubBlock="", budgetBlock="", startBtn="";
  if(setupCfg.conf){
    const cs=WORLD_COUNTRIES.filter(w=>w.c===setupCfg.conf);
    countryBlock=`<div class="field"><label>选择国家</label><div style="display:flex;gap:6px;flex-wrap:wrap">${cs.map(w=>`<span class="chip ${setupCfg.country===w.n?'active':''}" onclick="setCountry('${w.n}')">${flagOf(w.n)}${w.n}</span>`).join("")}</div></div>`;
  }
  if(setupCfg.country){
    const clubs=setupWorld.map((c,i)=>({c,i})).filter(o=>o.c.country===setupCfg.country).sort((a,b)=>a.c.div-b.c.div||b.c.str-a.c.str);
    clubBlock=`<div class="field"><label>选择执教的俱乐部（实力越高越强；可选低级别/弱队挑战重建）</label>
      <div style="display:flex;gap:6px;flex-wrap:wrap;max-height:180px;overflow:auto">${clubs.map(o=>`<span class="chip ${setupCfg.clubIdx===o.i?'active':''}" onclick="setClub(${o.i})">${o.c.name} · ${Math.round(o.c.str)} · ${DIV_NAMES[o.c.div]||'联赛'}</span>`).join("")}</div></div>`;
  }
  if(setupCfg.clubIdx!=null){
    budgetBlock=`<div class="field"><label>启动资金（难度）</label>
      <div class="row"><input type="range" id="setBudget" min="10" max="300" step="5" value="${setupCfg.budget}"
        oninput="setupCfg.budget=+this.value; document.getElementById('setBudgetV').innerHTML=eur(+this.value)+' · '+budgetDifficulty(+this.value)">
        <span class="rngval" id="setBudgetV" style="min-width:110px">${eur(setupCfg.budget)} · ${budgetDifficulty(setupCfg.budget)}</span></div></div>`;
    startBtn=`<button class="btn big" style="width:100%;margin-top:10px" onclick="doNewGame()">执教 ${setupWorld[setupCfg.clubIdx].name} ▶</button>`;
  }
  showOverlay(`<h2>🆕 新的征程（选大洲 → 国家 → 俱乐部）</h2>
    <div class="field"><label>选择所属大洲</label><div style="display:flex;gap:6px;flex-wrap:wrap">${confChips}</div></div>
    ${countryBlock}${clubBlock}${budgetBlock}${startBtn}`);
}
function doNewGame(){
  if(setupCfg.clubIdx==null){ toast("请先选择执教的俱乐部"); return; }
  newGame(setupWorld, setupCfg.clubIdx, setupCfg.budget);
  setupWorld=null; closeOverlay(); G.tab="squad"; render();
}

// ---------- 事件 ----------
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>switchTab(t.dataset.tab)));
$("#nextBtn").addEventListener("click",advance);
$("#overlay").addEventListener("click",e=>{ if(e.target.id==="overlay") closeOverlay(); });

// ---------- 启动 ----------
if(!load()) confirmNewGame(); else { save(); render(); }  // load() 内已修复重复 id，立即落盘固化
</script>
</body>
</html>
